<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta http-equiv="Permissions-Policy" content="fullscreen=*" />
  <meta name="theme-color" content="#000000" />
  <title>Direct — STREEMIO</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%2322c55e;stop-opacity:1'/%3E%3Cstop offset='100%25' style='stop-color:%2316a34a;stop-opacity:1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='url(%23g)'/%3E%3Ctext x='50' y='62' text-anchor='middle' fill='white' font-family='Arial Black' font-size='40' font-weight='900'%3ESM%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" as="style" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --glass: rgba(15, 15, 15, 0.9);
      --emerald-400: #34d399;
      --emerald-500: #10b981;
      --emerald-mist: rgba(16, 185, 129, 0.06);
      --text-primary: #f0f0f0;
      --text-secondary: #909090;
      --hairline: rgba(255,255,255,0.05);
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-pill: 100px;
    }

    [data-theme="light"] {
      --glass: rgba(242, 244, 242, 0.9);
      --text-primary: #1a1a1a;
      --text-secondary: #606060;
      --hairline: rgba(0,0,0,0.05);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: #000;
      color: var(--text-primary);
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .topbar {
      flex-shrink: 0;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--hairline);
      padding: 0.45rem 0;
      z-index: 10;
    }

    .topbar-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.78rem;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--emerald-400); }

    .channel-label {
      font-weight: 700;
      font-size: 0.88rem;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 200px;
    }

    .player-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
      padding: 0.35rem;
      min-height: 0;
    }

    /* ═══════════ CONTENEUR VIDÉO ═══════════ */
    .video-container {
      flex: 1;
      background: #000;
      border-radius: var(--radius-md);
      overflow: hidden;
      position: relative;
      min-height: 260px;
      border: 1px solid var(--hairline);
      aspect-ratio: 16 / 9;
      max-height: calc(100vh - 140px);
    }

    /* Plein écran natif : le conteneur prend tout */
    .video-container:fullscreen {
      border-radius: 0;
      border: none;
      max-height: none;
      aspect-ratio: auto;
    }

    .video-container:-webkit-full-screen {
      border-radius: 0;
      border: none;
      max-height: none;
      aspect-ratio: auto;
    }

    .video-container:-moz-full-screen {
      border-radius: 0;
      border: none;
      max-height: none;
      aspect-ratio: auto;
    }

    .video-container:-ms-fullscreen {
      border-radius: 0;
      border: none;
      max-height: none;
      aspect-ratio: auto;
    }

    /* Wrapper de zoom */
    .video-zoom-wrapper {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    /* Plein écran : le wrapper remplit tout */
    .video-container:fullscreen .video-zoom-wrapper {
      position: absolute;
      inset: 0;
    }

    .video-zoom-wrapper iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 104%;
      height: 104%;
      transform: translate(-50%, -50%) scale(1.04);
      border: none;
      transform-origin: center center;
    }

    /* Plein écran : on garde le zoom */
    .video-container:fullscreen .video-zoom-wrapper iframe {
      width: 104%;
      height: 104%;
      transform: translate(-50%, -50%) scale(1.04);
    }

    .no-feed {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      color: var(--text-secondary);
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .no-feed .icon { font-size: 3rem; opacity: 0.3; margin-bottom: 0.5rem; }
    .no-feed .title { font-size: 1rem; font-weight: 700; color: var(--text-primary); }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.5rem 0;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .ctrl {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      padding: 0.45rem 0.9rem;
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-pill);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .ctrl:hover { border-color: var(--emerald-500); background: var(--emerald-mist); color: var(--emerald-400); }
    .ctrl.on { background: rgba(16,185,129,0.12); border-color: rgba(16,185,129,0.3); color: var(--emerald-400); }
    .ctrl svg { width: 14px; height: 14px; }

    .tip {
      padding: 0.55rem 0.75rem;
      background: var(--glass);
      border-radius: var(--radius-md);
      flex-shrink: 0;
      margin-top: 0.3rem;
    }

    .tip p { color: var(--text-secondary); font-size: 0.68rem; }
    .tip strong { color: var(--emerald-400); }

    @media (max-width: 768px) {
      .player-zone { padding: 0.2rem; }
      .video-container { border-radius: var(--radius-sm); min-height: 200px; }
      .ctrl { padding: 0.4rem 0.7rem; font-size: 0.7rem; }
    }

    @media (max-width: 380px) {
      .ctrl span { display: none; }
      .ctrl { padding: 0.45rem; }
      .ctrl svg { width: 17px; height: 17px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="index.html" class="back-link">← Retour</a>
      <span class="channel-label" id="channelTitle">Chargement...</span>
      <div style="width:60px;"></div>
    </div>
  </header>

  <main class="player-zone">
    <div class="video-container" id="videoContainer">
      <div class="no-feed" id="noFeed">
        <div class="icon">📺</div>
        <div class="title">Aucun flux</div>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl" id="btnPause">
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        <span>Pause</span>
      </button>
      <button class="ctrl" id="btnFullscreen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        <span>Plein écran</span>
      </button>
      <button class="ctrl" id="btnRefresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        <span>Actualiser</span>
      </button>
    </div>

    <div class="tip">
      <p>💡 <strong>Conseil :</strong> Connexion ≥ 5 Mbps recommandée.</p>
    </div>
  </main>

  <script>
    // ═══════════ LIENS DES FLUX ═══════════
    const STREAM_URLS = {
      "beIN SPORTS 1": "https://mapple.uk/live-tv-premium/116",
      "beIN SPORTS 2": "https://mapple.uk/live-tv-premium/117",
      "beIN SPORTS 3": "https://mapple.uk/live-tv-premium/118",
      "beIN SPORTS MAX 4": "https://mapple.uk/live-tv-premium/494",
      "beIN SPORTS MAX 5": "https://mapple.uk/live-tv-premium/495",
      "beIN SPORTS MAX 6": "https://mapple.uk/live-tv-premium/496",
      "beIN SPORTS MAX 7": "https://mapple.uk/live-tv-premium/497",
      "beIN SPORTS MAX 8": "https://mapple.uk/live-tv-premium/498",
      "beIN SPORTS MAX 9": "https://mapple.uk/live-tv-premium/499",
      "beIN SPORTS MAX 10": "https://mapple.uk/live-tv-premium/500",
      "Canal": "https://mapple.uk/live-tv-premium/121",
      "Canal Sport": "https://mapple.uk/live-tv-premium/122",
      "Canal Sport360": "https://mapple.uk/live-tv-premium/464",
      "Canal Foot": "https://mapple.uk/live-tv-premium/463",
      "Ligue 1+": "https://mapple.uk/live-tv-premium/960",
      "Eurosport 1": "https://mapple.uk/live-tv-premium/772",
      "Eurosport 2": "https://mapple.uk/live-tv-premium/773",
      "RMC Sport 1": "https://mapple.uk/live-tv-premium/119",
      "Ligue 1+ 4": "https://mapple.uk/live-tv-premium/960",
      "Ligue 1+ 5": "https://mapple.uk/live-tv-premium/960",
      "Ligue 1+ 6": "https://mapple.uk/live-tv-premium/960",
      "RMC Sport 2": "",
      "L Equipe": "",
      "France 2": "",
      "France 3": "",
      "TF1": "",
      "France 24": "",
      "Canal Live 1": "", "Canal Live 2": "", "Canal Live 3": "", "Canal Live 4": "", "Canal Live 5": "",
      "Canal Live 6": "", "Canal Live 7": "", "Canal Live 8": "", "Canal Live 9": "", "Canal Live 10": "",
      "Canal Live 11": "", "Canal Live 12": "", "Canal Live 13": "", "Canal Live 14": "", "Canal Live 15": "",
      "Canal Live 16": "", "Canal Live 17": "", "Canal Live 18": "", "Canal Live 19": ""
    };

    const channel = new URLSearchParams(window.location.search).get('c') || '';
    document.getElementById('channelTitle').textContent = channel || 'STREEMIO';
    document.title = channel ? channel + ' — STREEMIO' : 'STREEMIO';

    let iframe = null, paused = false, savedSrc = '';
    const url = STREAM_URLS[channel];
    const vc = document.getElementById('videoContainer');

    if (url) {
      document.getElementById('noFeed').style.display = 'none';
      
      const zoomWrapper = document.createElement('div');
      zoomWrapper.className = 'video-zoom-wrapper';
      
      iframe = document.createElement('iframe');
      iframe.src = url;
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen';
      iframe.allowFullscreen = true;
      iframe.setAttribute('webkitallowfullscreen', 'true');
      iframe.setAttribute('mozallowfullscreen', 'true');
      
      zoomWrapper.appendChild(iframe);
      vc.appendChild(zoomWrapper);
    }

    // ═══════════ PLEIN ÉCRAN CORRIGÉ ═══════════
    document.getElementById('btnFullscreen').addEventListener('click', () => {
      // Priorité : mettre le conteneur en plein écran (pas l'iframe)
      if (vc.requestFullscreen) {
        vc.requestFullscreen().catch(() => {
          // Fallback 1 : essayer l'iframe
          if (iframe && iframe.requestFullscreen) {
            iframe.requestFullscreen().catch(() => {});
          }
        });
      } else if (vc.webkitRequestFullscreen) {
        vc.webkitRequestFullscreen();
      } else if (vc.webkitEnterFullscreen) {
        // iOS Safari
        vc.webkitEnterFullscreen();
      } else if (vc.msRequestFullscreen) {
        vc.msRequestFullscreen();
      } else if (iframe && iframe.webkitEnterFullscreen) {
        iframe.webkitEnterFullscreen();
      }
    });

    document.getElementById('btnPause').addEventListener('click', () => {
      if (!iframe || !url) return;
      const btn = document.getElementById('btnPause');
      if (!paused) {
        savedSrc = iframe.src; iframe.src = '';
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg><span>Lecture</span>';
        btn.classList.add('on'); paused = true;
      } else {
        iframe.src = savedSrc;
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg><span>Pause</span>';
        btn.classList.remove('on'); paused = false;
      }
    });

    document.getElementById('btnRefresh').addEventListener('click', () => {
      if (!iframe || !url) return;
      iframe.src = '';
      setTimeout(() => { 
        iframe.src = url; 
        if (paused) { 
          paused = false; 
          const btn = document.getElementById('btnPause'); 
          btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg><span>Pause</span>'; 
          btn.classList.remove('on'); 
        } 
      }, 200);
    });
  </script>
</body>
</html>
