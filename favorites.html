<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="NovaPlay — Mes favoris" />
  <meta name="theme-color" content="#000000" />
  <title>Favoris — NovaPlay</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='100%25' x2='100%25' y2='0%25'%3E%3Cstop offset='0%25' style='stop-color:%23a855f7'/%3E%3Cstop offset='100%25' style='stop-color:%236365f1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='46' fill='url(%23g)'/%3E%3Ctext x='50' y='66' text-anchor='middle' fill='white' font-family='sans-serif' font-size='48' font-weight='900'%3EN%3C/text%3E%3Ccircle cx='50' cy='50' r='12' fill='none' stroke='white' stroke-width='2' opacity='0.6'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:#000; --void:#0a0a0a; --slate:#141414; --glass:rgba(10,10,10,0.88);
      --violet:#a855f7; --violet-light:#c084fc; --indigo:#6365f1;
      --violet-smudge:rgba(168,85,247,0.06); --violet-border:rgba(168,85,247,0.12);
      --text:#f0f0f0; --text2:#999; --text3:#666;
      --line:rgba(255,255,255,0.04); --line2:rgba(255,255,255,0.08);
      --r-xs:6px; --r-sm:10px; --r-md:16px; --r-lg:22px; --r-full:100px;
      --shadow:0 12px 40px rgba(0,0,0,0.6);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Space Grotesk',sans-serif; background:var(--ink); color:var(--text); line-height:1.5; min-height:100vh; -webkit-font-smoothing:antialiased; display:flex; flex-direction:column; }
    ::-webkit-scrollbar { width:3px; } ::-webkit-scrollbar-track { background:var(--ink); } ::-webkit-scrollbar-thumb { background:var(--violet); border-radius:10px; }
    .bg-aura { position:fixed; inset:0; pointer-events:none; z-index:0; background:radial-gradient(ellipse at 25% 30%,rgba(168,85,247,0.05) 0%,transparent 55%),radial-gradient(ellipse at 70% 60%,rgba(99,101,241,0.04) 0%,transparent 50%); }

    .header { position:sticky; top:0; z-index:100; background:var(--glass); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); border-bottom:1px solid var(--line); padding:0.5rem 0; }
    .header-row { max-width:1200px; margin:0 auto; padding:0 1.5rem; display:flex; align-items:center; gap:2rem; }
    .logo-link { display:flex; align-items:center; gap:0.55rem; text-decoration:none; color:var(--text); flex-shrink:0; }
    .logo-svg { width:32px; height:32px; }
    .logo-word { font-size:1.1rem; font-weight:700; letter-spacing:-0.03em; }
    .logo-word span { background:linear-gradient(135deg,var(--violet-light),var(--indigo)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .nav-pills { display:flex; gap:0.2rem; background:var(--slate); padding:0.2rem; border-radius:var(--r-md); border:1px solid var(--line); }
    .nav-pill { padding:0.4rem 1rem; border-radius:var(--r-xs); color:var(--text2); text-decoration:none; font-weight:500; font-size:0.76rem; transition:all 0.2s; }
    .nav-pill:hover { color:var(--text); }
    .nav-pill.on { background:var(--violet-smudge); color:var(--violet-light); font-weight:600; }
    .header-end { margin-left:auto; display:flex; align-items:center; gap:0.8rem; }
    .live-chip { display:flex; align-items:center; gap:0.3rem; padding:0.25rem 0.7rem; background:var(--violet-smudge); border:1px solid var(--violet-border); border-radius:var(--r-full); font-weight:600; font-size:0.64rem; color:var(--violet-light); }
    .live-dot { width:5px; height:5px; background:var(--violet); border-radius:50%; animation:beat 2.5s infinite; }
    @keyframes beat { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(168,85,247,0.5)} 50%{opacity:0.3;box-shadow:0 0 0 6px rgba(168,85,247,0)} }
    .h-clock { font-weight:700; font-size:0.8rem; color:var(--violet-light); font-variant-numeric:tabular-nums; }

    .wrap { max-width:1000px; margin:0 auto; padding:1.5rem; flex:1; width:100%; }
    .pg-head { text-align:center; padding:1.5rem 0 2rem; }
    .pg-title { font-size:1.5rem; font-weight:700; }
    .pg-title em { font-style:normal; background:linear-gradient(135deg,var(--violet-light),var(--indigo)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:0.8rem; }
    .card {
      background:var(--slate); border:1px solid var(--line); border-radius:var(--r-lg);
      overflow:hidden; text-decoration:none; color:inherit; transition:all 0.3s; display:flex; flex-direction:column;
    }
    .card:hover { transform:translateY(-4px); border-color:var(--violet-border); box-shadow:var(--shadow),0 0 0 1px var(--violet-border); }
    .card-media { padding:1.4rem 1.4rem 0.7rem; display:flex; align-items:center; justify-content:center; min-height:110px; background:var(--void); }
    .card-img { max-width:60%; max-height:52px; object-fit:contain; transition:transform 0.4s; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
    .card:hover .card-img { transform:scale(1.07); }
    .card-body { padding:0.7rem 1rem 0.9rem; text-align:center; }
    .card-status { display:inline-flex; align-items:center; gap:0.25rem; padding:0.15rem 0.55rem; border-radius:var(--r-xs); font-size:0.54rem; font-weight:700; text-transform:uppercase; letter-spacing:0.03em; margin-bottom:0.3rem; }
    .card-status.live { background:rgba(168,85,247,0.1); color:var(--violet-light); border:1px solid var(--violet-border); }
    .card-status.off { background:rgba(255,255,255,0.04); color:var(--text3); border:1px solid var(--line); }
    .card-bulb { width:4px; height:4px; border-radius:50%; }
    .card-bulb.live { background:var(--violet); box-shadow:0 0 6px rgba(168,85,247,0.4); animation:beat 2.5s infinite; }
    .card-bulb.off { background:var(--text3); }
    .card-name { font-weight:600; font-size:0.78rem; line-height:1.25; }
    .card-sub { color:var(--text3); font-size:0.56rem; margin-top:0.08rem; text-transform:uppercase; }
    .empty { text-align:center; padding:3rem 2rem; background:var(--slate); border:1px dashed var(--line2); border-radius:var(--r-lg); }
    .empty-icon { font-size:2.5rem; opacity:0.12; margin-bottom:0.6rem; }
    .empty-title { font-weight:600; font-size:0.9rem; margin-bottom:0.2rem; }
    .empty-desc { font-size:0.7rem; color:var(--text2); }
    .empty-link { display:inline-block; margin-top:1rem; padding:0.5rem 1.5rem; background:var(--violet-smudge); border:1px solid var(--violet-border); border-radius:var(--r-full); color:var(--violet-light); text-decoration:none; font-weight:600; font-size:0.72rem; }
    .empty-link:hover { background:rgba(168,85,247,0.1); }

    .footer { text-align:center; padding:1.5rem; border-top:1px solid var(--line); }
    .footer-logo { font-size:0.8rem; font-weight:700; }
    .footer-logo em { font-style:normal; background:linear-gradient(135deg,var(--violet-light),var(--indigo)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .footer-legal { color:var(--text3); font-size:0.6rem; margin-top:0.15rem; }
    .footer-note { color:var(--text3); font-size:0.42rem; margin-top:0.1rem; opacity:0.35; }

    @media (max-width:768px) { .header-row{flex-wrap:wrap;gap:0.5rem;justify-content:center} .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:0.5rem} }
    @media (max-width:480px) { .grid{grid-template-columns:repeat(2,1fr)} }
  </style>
</head>
<body>
  <div class="bg-aura"></div>

  <header class="header">
    <div class="header-row">
      <a href="index.html" class="logo-link">
        <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#a855f7"/><stop offset="100%" style="stop-color:#6365f1"/></linearGradient></defs><circle cx="50" cy="50" r="46" fill="url(#bg)"/><text x="50" y="66" text-anchor="middle" fill="white" font-family="sans-serif" font-size="48" font-weight="900">N</text><circle cx="50" cy="50" r="12" fill="none" stroke="white" stroke-width="2" opacity="0.6"/></svg>
        <span class="logo-word">Nova<span>Play</span></span>
      </a>
      <nav class="nav-pills">
        <a href="index.html" class="nav-pill">Accueil</a>
        <a href="favorites.html" class="nav-pill on">⭐ Favoris</a>
      </nav>
      <div class="header-end">
        <span class="live-chip"><span class="live-dot"></span>26 directs</span>
        <span class="h-clock" id="clock">00:00</span>
      </div>
    </div>
  </header>

  <div class="wrap">
    <div class="pg-head"><h1 class="pg-title">Mes <em>Favoris</em></h1></div>
    <div class="grid" id="grid"></div>
  </div>

  <footer class="footer">
    <p class="footer-logo">Nova<em>Play</em></p>
    <p class="footer-legal">© 2026 — Streaming sportif gratuit</p>
    <p class="footer-note">NovaPlay ne stocke ni n'héberge aucun contenu. Tous les flux sont des liens directs externes.</p>
  </footer>

  <script defer>
    const CHANNELS = [
      { name:"beIN SPORTS 1", image:"https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_1_134e751711.png", status:"online", quality:"FHD" },
      { name:"beIN SPORTS 2", image:"https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_2_7cb5d3a006.png", status:"online", quality:"FHD" },
      { name:"Canal", image:"https://freebox.cdn.scw.iliad.fr/4_5086f4334d.png", status:"online", quality:"FHD" },
      { name:"Canal Foot", image:"https://freebox.cdn.scw.iliad.fr/2023_07_24_RVB_LOGO_CANALPLUS_FOOT_581adea3dd.png", status:"online", quality:"FHD" },
      { name:"Ligue 1+", image:"https://freebox.cdn.scw.iliad.fr/large_LFP_LOGOTYPE_L1_MASTER_ELECTRIC_BLUE_RVB_2_5e790f2852.png", status:"online", quality:"HD" },
      { name:"Eurosport 1", image:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Eurosport_HD_since_2015.svg/120px-Eurosport_HD_since_2015.svg.png", status:"online", quality:"HD" },
      { name:"Eurosport 2", image:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Eurosport_2_HD_Logo_2015.svg/1920px-Eurosport_2_HD_Logo_2015.svg.png", status:"online", quality:"HD" },
      { name:"RMC Sport 1", image:"https://upload.wikimedia.org/wikipedia/commons/b/bf/Logo_RMC_Sport_2018.svg", status:"online", quality:"HD" }
    ];
    const PH="data:image/svg+xml,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="120" height="48"><rect fill="#141414" width="120" height="48" rx="8"/><text x="60" y="30" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="10" font-weight="700">NP</text></svg>');
    const favs=JSON.parse(localStorage.getItem('np_favs')||'[]'), grid=document.getElementById('grid');
    if(favs.length===0){ grid.innerHTML='<div class="empty"><div class="empty-icon">⭐</div><div class="empty-title">Aucun favori</div><div class="empty-desc">Ajoutez des chaînes depuis les catégories</div><a href="channels.html?cat=bein" class="empty-link">🔥 Découvrir</a></div>'; }
    else { const fc=CHANNELS.filter(ch=>favs.includes(ch.name)); grid.innerHTML=fc.map(ch=>{ const o=ch.status==='offline'; return '<a href="stream.html?c='+encodeURIComponent(ch.name)+'" class="card"><div class="card-media"><img class="card-img" src="'+(ch.image||PH)+'" alt="" loading="lazy" /></div><div class="card-body"><span class="card-status'+(o?' off':' live')+'"><span class="card-bulb'+(o?' off':' live')+'"></span>'+(o?'Offline':'Direct')+'</span><div class="card-name">'+ch.name+'</div><div class="card-sub">France</div></div></a>'; }).join(''); }
    function tc(){ document.getElementById('clock').textContent=String(new Date().getHours()).padStart(2,'0')+':'+String(new Date().getMinutes()).padStart(2,'0'); } tc();setInterval(tc,30000);
  </script>
</body>
</html>
