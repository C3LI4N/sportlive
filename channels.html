<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="NovaPlay — Chaînes sportives" />
  <meta name="theme-color" content="#000000" />
  <title>Chaînes — NovaPlay</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='100%25' x2='100%25' y2='0%25'%3E%3Cstop offset='0%25' style='stop-color:%23a855f7'/%3E%3Cstop offset='100%25' style='stop-color:%236365f1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='46' fill='url(%23g)'/%3E%3Ctext x='50' y='66' text-anchor='middle' fill='white' font-family='sans-serif' font-size='48' font-weight='900'%3EN%3C/text%3E%3Ccircle cx='50' cy='50' r='12' fill='none' stroke='white' stroke-width='2' opacity='0.6'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:#000; --void:#0a0a0a; --slate:#141414; --glass:rgba(10,10,10,0.88);
      --violet:#a855f7; --violet-light:#c084fc; --indigo:#6365f1; --blue:#3b82f6;
      --violet-smudge:rgba(168,85,247,0.06); --violet-border:rgba(168,85,247,0.12);
      --amber:#fbbf24;
      --text:#f0f0f0; --text2:#999; --text3:#666;
      --line:rgba(255,255,255,0.04); --line2:rgba(255,255,255,0.08);
      --r-xs:6px; --r-sm:10px; --r-md:16px; --r-lg:22px; --r-full:100px;
      --shadow:0 12px 40px rgba(0,0,0,0.6);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Space Grotesk',sans-serif; background:var(--ink); color:var(--text); line-height:1.5; min-height:100vh; -webkit-font-smoothing:antialiased; display:flex; flex-direction:column; }
    ::-webkit-scrollbar { width:3px; } ::-webkit-scrollbar-track { background:var(--ink); } ::-webkit-scrollbar-thumb { background:var(--violet); border-radius:10px; }
    .bg-aura { position:fixed; inset:0; pointer-events:none; z-index:0; }

    .header { position:sticky; top:0; z-index:100; background:var(--glass); backdrop-filter:blur(24px); border-bottom:1px solid var(--line); padding:0.5rem 0; }
    .header-row { max-width:100%; margin:0 auto; padding:0 1.5rem; display:flex; align-items:center; gap:1.5rem; }
    .logo-link { display:flex; align-items:center; gap:0.5rem; text-decoration:none; color:var(--text); }
    .logo-svg { width:36px; height:36px; animation:logoPulse 3s ease-in-out infinite; }
    @keyframes logoPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    .logo-word { font-size:1.1rem; font-weight:700; }
    .logo-word span { background:linear-gradient(135deg,var(--violet-light),var(--indigo)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .header-end { margin-left:auto; display:flex; align-items:center; gap:0.8rem; }
    .live-chip { display:flex; align-items:center; gap:0.3rem; padding:0.25rem 0.7rem; background:var(--violet-smudge); border:1px solid var(--violet-border); border-radius:var(--r-full); font-weight:600; font-size:0.64rem; color:var(--violet-light); }
    .live-dot { width:5px; height:5px; background:var(--violet); border-radius:50%; animation:beat 2.5s infinite; }
    @keyframes beat { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(168,85,247,0.5)} 50%{opacity:0.3;box-shadow:0 0 0 6px rgba(168,85,247,0)} }
    .h-clock { font-weight:700; font-size:0.8rem; color:var(--violet-light); }
    .h-fav { color:var(--violet-light); text-decoration:none; font-weight:600; font-size:0.8rem; }

    .layout { display:flex; flex:1; position:relative; z-index:1; }
    .sidebar {
      width:230px; flex-shrink:0; background:var(--glass); backdrop-filter:blur(20px);
      border-right:1px solid var(--line); padding:1.2rem 1rem; display:flex; flex-direction:column; gap:0.2rem;
      position:sticky; top:57px; height:calc(100vh - 57px); overflow-y:auto;
    }
    .s-section { font-size:0.58rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--text3); padding:0.8rem 0.3rem 0.2rem; }
    .s-link { display:flex; align-items:center; gap:0.5rem; padding:0.5rem 0.6rem; border-radius:var(--r-xs); color:var(--text2); text-decoration:none; font-weight:500; font-size:0.76rem; transition:all 0.2s; }
    .s-link:hover { color:var(--text); background:rgba(255,255,255,0.03); }
    .s-link.on { background:var(--violet-smudge); color:var(--violet-light); font-weight:600; }
    .s-spacer { flex:1; }
    .s-info { display:flex; flex-direction:column; align-items:center; gap:0.3rem; padding:1rem 0; }
    .s-live { display:flex; align-items:center; gap:0.4rem; font-weight:600; font-size:0.74rem; color:var(--violet-light); }
    .s-live-dot { width:6px; height:6px; background:var(--violet); border-radius:50%; animation:beat 2.5s infinite; }
    .s-clock { font-weight:700; font-size:1rem; color:var(--text); }

    .main-content { flex:1; padding:1.5rem; min-width:0; }

    /* ── TOOLBAR ── */
    .toolbar { display:flex; align-items:center; gap:0.6rem; margin-bottom:1.2rem; flex-wrap:wrap; }
    .search-box { flex:1; min-width:200px; position:relative; }
    .search-input { width:100%; padding:0.6rem 1rem 0.6rem 2.5rem; background:var(--slate); border:1px solid var(--line2); border-radius:var(--r-sm); color:var(--text); font-family:inherit; font-size:0.8rem; outline:none; transition:border 0.2s; }
    .search-input:focus { border-color:var(--violet); }
    .search-icon { position:absolute; left:0.8rem; top:50%; transform:translateY(-50%); color:var(--text3); font-size:0.9rem; pointer-events:none; }
    .view-btns { display:flex; gap:0.3rem; }
    .view-btn { padding:0.45rem 0.7rem; background:var(--slate); border:1px solid var(--line2); border-radius:var(--r-xs); color:var(--text2); cursor:pointer; font-family:inherit; font-size:0.75rem; transition:all 0.2s; }
    .view-btn:hover { border-color:var(--violet); color:var(--text); }
    .view-btn.on { background:var(--violet-smudge); border-color:var(--violet-border); color:var(--violet-light); }
    .live-filter { display:flex; align-items:center; gap:0.4rem; padding:0.45rem 0.8rem; background:var(--slate); border:1px solid var(--line2); border-radius:var(--r-xs); color:var(--text2); cursor:pointer; font-family:inherit; font-size:0.75rem; transition:all 0.2s; }
    .live-filter:hover { border-color:var(--violet); }
    .live-filter.on { background:var(--violet-smudge); border-color:var(--violet-border); color:var(--violet-light); }
    .live-filter-dot { width:6px; height:6px; background:var(--violet); border-radius:50%; animation:beat 2.5s infinite; }

    /* ── GRID ── */
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:0.7rem; }
    .grid.list { grid-template-columns:1fr; }
    .card-wrap { position:relative; }
    .card {
      background:var(--slate); border:1px solid var(--line); border-radius:var(--r-lg);
      overflow:hidden; text-decoration:none; color:inherit; transition:all 0.3s; display:flex; flex-direction:column;
    }
    .grid.list .card { flex-direction:row; align-items:center; }
    .card:hover { transform:translateY(-4px); border-color:var(--violet-border); box-shadow:var(--shadow),0 0 0 1px var(--violet-border); }
    .grid.list .card:hover { transform:translateX(4px); }
    .card-media { padding:1.3rem 1.3rem 0.6rem; display:flex; align-items:center; justify-content:center; min-height:100px; background:var(--void); }
    .grid.list .card-media { min-height:60px; padding:0.8rem 1rem; min-width:100px; }
    .card-img { max-width:60%; max-height:48px; object-fit:contain; transition:transform 0.4s; }
    .grid.list .card-img { max-width:80px; max-height:32px; }
    .card:hover .card-img { transform:scale(1.06); }
    .card-body { padding:0.6rem 0.9rem 0.8rem; text-align:center; }
    .grid.list .card-body { text-align:left; flex:1; display:flex; align-items:center; gap:1rem; }
    .card-status { display:inline-flex; align-items:center; gap:0.2rem; padding:0.12rem 0.5rem; border-radius:var(--r-xs); font-size:0.52rem; font-weight:700; text-transform:uppercase; letter-spacing:0.03em; margin-bottom:0.25rem; }
    .grid.list .card-status { margin-bottom:0; }
    .card-status.live { background:rgba(168,85,247,0.1); color:var(--violet-light); border:1px solid var(--violet-border); }
    .card-status.off { background:rgba(255,255,255,0.04); color:var(--text3); border:1px solid var(--line); }
    .card-bulb { width:4px; height:4px; border-radius:50%; }
    .card-bulb.live { background:var(--violet); box-shadow:0 0 6px rgba(168,85,247,0.4); animation:beat 2.5s infinite; }
    .card-bulb.off { background:var(--text3); }
    .card-name { font-weight:600; font-size:0.76rem; line-height:1.25; }
    .card-sub { color:var(--text3); font-size:0.54rem; margin-top:0.06rem; text-transform:uppercase; }

    /* ── QUALITY TAG ── */
    .q-tag { display:inline-block; padding:0.1rem 0.4rem; border-radius:var(--r-xs); font-size:0.5rem; font-weight:700; letter-spacing:0.04em; margin-left:0.4rem; }
    .q-fhd { background:rgba(168,85,247,0.15); color:var(--violet-light); }
    .q-hd { background:rgba(59,130,246,0.15); color:var(--blue); }
    .q-sd { background:rgba(255,255,255,0.05); color:var(--text3); }

    .fav-btn {
      position:absolute; top:0.4rem; right:0.4rem; z-index:10;
      width:28px; height:28px; border-radius:50%; background:var(--glass);
      border:1px solid var(--line2); color:var(--text3); font-size:0.8rem;
      cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s;
    }
    .fav-btn:hover { border-color:var(--amber); color:var(--amber); }
    .fav-btn.on { color:var(--amber); border-color:rgba(251,191,36,0.3); }

    .footer { text-align:center; padding:1.5rem; border-top:1px solid var(--line); }
    .footer-logo { font-size:0.8rem; font-weight:700; }
    .footer-logo em { font-style:normal; background:linear-gradient(135deg,var(--violet-light),var(--indigo)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .footer-legal { color:var(--text3); font-size:0.6rem; margin-top:0.15rem; }
    .footer-note { color:var(--text3); font-size:0.42rem; opacity:0.35; }

    @media (max-width:768px) {
      .layout { flex-direction:column; }
      .sidebar { width:100%; height:auto; position:static; flex-direction:row; flex-wrap:wrap; gap:0.3rem; padding:0.8rem; justify-content:center; }
      .s-section,.s-spacer,.s-info { display:none; }
      .s-link { padding:0.35rem 0.7rem; font-size:0.7rem; }
      .main-content { padding:1rem; }
      .grid { grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:0.5rem; }
    }
  </style>
</head>
<body>
  <div class="bg-aura"></div>

  <header class="header">
    <div class="header-row">
      <a href="index.html" class="logo-link">
        <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#a855f7"/><stop offset="100%" style="stop-color:#6365f1"/></linearGradient></defs><circle cx="50" cy="50" r="46" fill="url(#bg)"/><text x="50" y="66" text-anchor="middle" fill="white" font-family="sans-serif" font-size="48" font-weight="900">N</text><circle cx="50" cy="50" r="12" fill="none" stroke="white" stroke-width="2" opacity="0.6"/></svg>
        <span class="logo-word">Nova<span>Play</span></span>
      </a>
      <div class="header-end">
        <span class="live-chip"><span class="live-dot"></span>26 directs</span>
        <span class="h-clock" id="clock">00:00</span>
        <a href="favorites.html" class="h-fav">⭐ Favoris</a>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="s-section">Catégories</div>
      <a href="channels.html" class="s-link on" id="nav-all"><span>📡</span>Toutes</a>
      <a href="channels.html?cat=bein" class="s-link" id="nav-bein"><span>🔥</span>beIN Sports</a>
      <a href="channels.html?cat=canal" class="s-link" id="nav-canal"><span>📡</span>Canal +</a>
      <a href="channels.html?cat=ligue1" class="s-link" id="nav-ligue1"><span>⚽</span>Ligue 1 +</a>
      <a href="channels.html?cat=eurosport" class="s-link" id="nav-eurosport"><span>🏅</span>Eurosport</a>
      <a href="channels.html?cat=rmc" class="s-link" id="nav-rmc"><span>🎙️</span>RMC Sport</a>
      <div class="s-spacer"></div>
      <div class="s-info">
        <div class="s-live"><span class="s-live-dot"></span>26 directs</div>
        <div class="s-clock" id="sclock">00:00</div>
      </div>
    </aside>

    <div class="main-content">
      <div class="toolbar">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" id="searchInput" placeholder="Rechercher une chaîne..." />
        </div>
        <div class="view-btns">
          <button class="view-btn on" id="viewGrid" onclick="setView('grid')">▦ Grille</button>
          <button class="view-btn" id="viewList" onclick="setView('list')">☰ Liste</button>
        </div>
        <button class="live-filter" id="liveFilter" onclick="toggleLive()"><span class="live-filter-dot"></span> Direct</button>
      </div>
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <footer class="footer">
    <p class="footer-logo">Nova<em>Play</em></p>
    <p class="footer-legal">© 2026 — Streaming sportif gratuit</p>
    <p class="footer-note">NovaPlay ne stocke ni n'héberge aucun contenu.</p>
  </footer>

  <script defer>
    const CHANNELS = [
      { name:"beIN SPORTS 1", image:"https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_1_134e751711.png", status:"online", quality:"FHD" },
      { name:"beIN SPORTS 2", image:"https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_2_7cb5d3a006.png", status:"online", quality:"FHD" },
      { name:"beIN SPORTS 3", image:"https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_3_7e4adcefc6.png", status:"online", quality:"FHD" },
      { name:"beIN SPORTS MAX 4", image:"https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_MAX_4_c3c337c2ff.png", status:"online", quality:"HD" },
      { name:"beIN SPORTS MAX 5", image:"https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_MAX_5_ce5871fc49.png", status:"online", quality:"HD" },
      { name:"beIN SPORTS MAX 6", image:"https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_MAX_6_50f4830f78.png", status:"online", quality:"HD" },
      { name:"beIN SPORTS MAX 7", image:"https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_MAX_7_6ebdb0a7d8.png", status:"online", quality:"HD" },
      { name:"beIN SPORTS MAX 8", image:"https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_MAX_8_f699d80fa1.png", status:"online", quality:"HD" },
      { name:"beIN SPORTS MAX 9", image:"https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_MAX_9_17ef74743f.png", status:"online", quality:"HD" },
      { name:"beIN SPORTS MAX 10", image:"https://freebox.cdn.scw.iliad.fr/large_be_INSPORTSMAX_10_1ddd01afda.png", status:"online", quality:"HD" },
      { name:"Canal", image:"https://freebox.cdn.scw.iliad.fr/4_5086f4334d.png", status:"online", quality:"FHD" },
      { name:"Canal Sport", image:"https://freebox.cdn.scw.iliad.fr/2023_07_24_RVB_LOGO_CANALPLUS_SPORT_9bd2c51b31.png", status:"online", quality:"FHD" },
      { name:"Canal Sport360", image:"https://freebox.cdn.scw.iliad.fr/2023_07_24_RVB_LOGO_CANALPLUS_SPORT_360_7772de4eea.png", status:"online", quality:"FHD" },
      { name:"Canal Foot", image:"https://freebox.cdn.scw.iliad.fr/2023_07_24_RVB_LOGO_CANALPLUS_FOOT_581adea3dd.png", status:"online", quality:"FHD" },
      { name:"Canal Live 1", image:"https://thumb.canalplus.pro/http/unsafe/121x91/filters:quality(80)/canalplus-cdn.canal-plus.io/p1/channel/1135/canal-ouah/CHN43FN/CHN43FN_1135_10092024-cEcG", status:"online", quality:"HD" },
      { name:"Ligue 1+", image:"https://freebox.cdn.scw.iliad.fr/large_LFP_LOGOTYPE_L1_MASTER_ELECTRIC_BLUE_RVB_2_5e790f2852.png", status:"online", quality:"HD" },
      { name:"Eurosport 1", image:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Eurosport_HD_since_2015.svg/120px-Eurosport_HD_since_2015.svg.png", status:"online", quality:"HD" },
      { name:"Eurosport 2", image:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Eurosport_2_HD_Logo_2015.svg/1920px-Eurosport_2_HD_Logo_2015.svg.png", status:"online", quality:"HD" },
      { name:"RMC Sport 1", image:"https://upload.wikimedia.org/wikipedia/commons/b/bf/Logo_RMC_Sport_2018.svg", status:"online", quality:"HD" }
    ];
    const CATS = { all:{n:'Toutes les chaînes',f:x=>true}, bein:{n:'beIN Sports',f:x=>x.toLowerCase().includes('bein')}, canal:{n:'Canal +',f:x=>x.toLowerCase().includes('canal')}, ligue1:{n:'Ligue 1 +',f:x=>x.toLowerCase().includes('ligue')}, eurosport:{n:'Eurosport',f:x=>x.toLowerCase().includes('eurosport')}, rmc:{n:'RMC Sport',f:x=>x.toLowerCase().includes('rmc')} };
    const PH="data:image/svg+xml,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="120" height="48"><rect fill="#141414" width="120" height="48" rx="8"/><text x="60" y="30" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="10" font-weight="700">NP</text></svg>');

    const ck=new URLSearchParams(location.search).get('cat')||'all', cat=CATS[ck];
    let view='grid', liveOnly=false, search='';

    function qTag(q){ if(q==='FHD') return '<span class="q-tag q-fhd">FHD</span>'; if(q==='HD') return '<span class="q-tag q-hd">HD</span>'; return '<span class="q-tag q-sd">SD</span>'; }

    function render(){
      document.querySelectorAll('.s-link').forEach(l=>l.classList.remove('on'));
      document.getElementById('nav-'+(ck||'all'))?.classList.add('on');
      let chs=CHANNELS.filter(c=>cat.f(c.name));
      if(search) chs=chs.filter(c=>c.name.toLowerCase().includes(search.toLowerCase()));
      if(liveOnly) chs=chs.filter(c=>c.status==='online');
      const favs=JSON.parse(localStorage.getItem('np_favs')||'[]');
      const grid=document.getElementById('grid');
      grid.className='grid'+(view==='list'?' list':'');
      grid.innerHTML=chs.map(ch=>{
        const o=ch.status==='offline', fv=favs.includes(ch.name);
        return '<div class="card-wrap"><a href="stream.html?c='+encodeURIComponent(ch.name)+'" class="card"><div class="card-media"><img class="card-img" src="'+(ch.image||PH)+'" alt="" loading="lazy" /></div><div class="card-body"><span class="card-status'+(o?' off':' live')+'"><span class="card-bulb'+(o?' off':' live')+'"></span>'+(o?'Offline':'Direct')+'</span>'+qTag(ch.quality)+'<div class="card-name">'+ch.name+'</div><div class="card-sub">France</div></div></a><button class="fav-btn'+(fv?' on':'')+'" onclick="toggleFav(\''+ch.name.replace(/'/g,"\\'")+'\',this)">'+(fv?'★':'☆')+'</button></div>';
      }).join('');
    }

    window.toggleFav=function(n,b){let f=JSON.parse(localStorage.getItem('np_favs')||'[]');if(f.includes(n)){f=f.filter(x=>x!==n);b.innerHTML='☆';b.classList.remove('on');}else{f.push(n);b.innerHTML='★';b.classList.add('on');}localStorage.setItem('np_favs',JSON.stringify(f));};
    window.setView=function(v){ view=v; document.getElementById('viewGrid').classList.toggle('on',v==='grid'); document.getElementById('viewList').classList.toggle('on',v==='list'); render(); };
    window.toggleLive=function(){ liveOnly=!liveOnly; document.getElementById('liveFilter').classList.toggle('on',liveOnly); render(); };
    document.getElementById('searchInput').addEventListener('input',function(e){ search=e.target.value; render(); });

    function tc(){ document.getElementById('clock').textContent=String(new Date().getHours()).padStart(2,'0')+':'+String(new Date().getMinutes()).padStart(2,'0'); document.getElementById('sclock').textContent=String(new Date().getHours()).padStart(2,'0')+':'+String(new Date().getMinutes()).padStart(2,'0'); }
    tc();setInterval(tc,30000); render();
  </script>
</body>
</html>
