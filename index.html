  <style>
    :root {
      --bg-deep: #080c08;
      --bg-primary: #0e130e;
      --bg-secondary: #141a14;
      --bg-card: #1a221a;
      --bg-card-hover: #1f281f;
      --bg-glass: rgba(16, 22, 16, 0.9);
      
      --green-400: #4ade80;
      --green-500: #22c55e;
      --green-600: #16a34a;
      --green-subtle: rgba(34, 197, 94, 0.06);
      --green-border: rgba(34, 197, 94, 0.16);
      
      --text-primary: #edf5ed;
      --text-secondary: #9aa89a;
      --text-muted: #6a756a;
      
      --border-color: rgba(255, 255, 255, 0.05);
      --border-strong: rgba(255, 255, 255, 0.1);
      
      --gradient-brand: linear-gradient(135deg, #22c55e 0%, #16a34a 50%, #15803d 100%);
      --gradient-header: linear-gradient(180deg, rgba(16,22,16,0.98) 0%, rgba(16,22,16,0.92) 100%);
      
      --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.5);
      --shadow-md: 0 8px 40px rgba(0, 0, 0, 0.6);
      --shadow-brand: 0 4px 20px rgba(34, 197, 94, 0.15);
      
      --radius-xs: 6px;
      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 24px;
    }

    [data-theme="light"] {
      --bg-deep: #f0f4f0;
      --bg-primary: #f7faf7;
      --bg-secondary: #edf1ed;
      --bg-card: #ffffff;
      --bg-card-hover: #f5f8f5;
      --bg-glass: rgba(255, 255, 255, 0.92);
      
      --text-primary: #1a1f1a;
      --text-secondary: #4a504a;
      --text-muted: #7a807a;
      
      --border-color: rgba(0, 0, 0, 0.06);
      --border-strong: rgba(0, 0, 0, 0.1);
      
      --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 8px 40px rgba(0, 0, 0, 0.08);
      --shadow-brand: 0 4px 20px rgba(34, 197, 94, 0.1);
      --gradient-header: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.94) 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.3s ease, color 0.3s ease;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--green-600); border-radius: 10px; }

    .bg-texture {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.015;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(34,197,94,0.5) 0px, transparent 1px),
        radial-gradient(circle at 70% 60%, rgba(74,222,128,0.4) 0px, transparent 1px);
      background-size: 80px 80px, 100px 100px;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ═══════════ HEADER ═══════════ */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--gradient-header);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
      transition: box-shadow 0.3s ease;
    }

    .header.compact { box-shadow: 0 2px 20px rgba(0,0,0,0.3); }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0.6rem 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .logo-link {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      text-decoration: none;
      color: var(--text-primary);
      flex-shrink: 0;
    }

    .logo-svg { width: 36px; height: 36px; flex-shrink: 0; }

    .logo-text {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .logo-text .accent { color: var(--green-500); }

    .nav-pills {
      display: flex;
      gap: 0.15rem;
      background: var(--bg-secondary);
      padding: 0.2rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-color);
    }

    .nav-pill {
      padding: 0.5rem 1.1rem;
      border-radius: var(--radius-xs);
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.83rem;
      transition: all 0.2s ease;
    }

    .nav-pill:hover { color: var(--text-primary); background: var(--bg-card-hover); }
    .nav-pill.active { background: var(--green-subtle); color: var(--green-400); font-weight: 600; }

    .header-spacer { flex: 1; }

    .header-clock {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-primary);
      font-weight: 600;
      font-size: 0.9rem;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      background: var(--bg-secondary);
      padding: 0.4rem 0.9rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-color);
      white-space: nowrap;
    }

    .header-clock svg { width: 15px; height: 15px; color: var(--green-400); flex-shrink: 0; }
    .header-clock .time { color: var(--green-400); font-weight: 700; }

    .header-actions { display: flex; align-items: center; gap: 0.5rem; }

    .theme-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 0.45rem 0.6rem;
      cursor: pointer;
      font-size: 1rem;
      color: var(--text-primary);
      transition: all 0.2s ease;
    }

    .theme-btn:hover { border-color: var(--green-500); background: var(--bg-card-hover); }

    /* ═══════════ HERO ═══════════ */
    .hero {
      text-align: center;
      padding: 2.5rem 0 0.75rem;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--green-subtle);
      border: 1px solid var(--green-border);
      padding: 0.35rem 1rem;
      border-radius: 100px;
      font-weight: 600;
      font-size: 0.78rem;
      color: var(--green-400);
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .live-dot {
      width: 7px; height: 7px;
      background: var(--green-500);
      border-radius: 50%;
      animation: livePulse 2s infinite;
    }

    @keyframes livePulse {
      0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(34,197,94,0.7); }
      50% { opacity:0.5; box-shadow:0 0 0 8px rgba(34,197,94,0); }
    }

    .hero-title {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    .hero-title .brand-gradient {
      background: var(--gradient-brand);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-desc {
      font-size: 0.95rem;
      color: var(--text-secondary);
      max-width: 440px;
      margin: 0 auto;
    }

    /* ═══════════ QUICK NAV ═══════════ */
    .quick-nav {
      display: flex;
      justify-content: center;
      gap: 0.4rem;
      padding: 1rem 0 1.25rem;
      flex-wrap: wrap;
    }

    .quick-nav-btn {
      padding: 0.45rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      white-space: nowrap;
    }

    .quick-nav-btn:hover { border-color: var(--green-500); color: var(--green-400); background: var(--green-subtle); }

    /* ═══════════ CATEGORIES ═══════════ */
    .category-section { margin-bottom: 2.5rem; }

    .category-head {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 1rem;
      padding-bottom: 0.7rem;
      border-bottom: 1px solid var(--border-color);
    }

    .category-icon-block {
      width: 34px; height: 34px;
      border-radius: var(--radius-sm);
      background: var(--gradient-brand);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      box-shadow: var(--shadow-brand);
    }

    .category-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .category-subtitle {
      margin-left: auto;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 500;
    }

    .channel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 0.9rem;
    }

    .channel-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: all 0.28s ease;
    }

    .channel-card:hover {
      transform: translateY(-3px);
      border-color: var(--border-strong);
      box-shadow: var(--shadow-md);
    }

    .card-top {
      padding: 0.7rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .card-status {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      color: var(--green-400);
    }

    .card-status.off { color: var(--text-muted); }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green-500);
    }

    .status-dot.off { background: var(--text-muted); }

    .quality-tag {
      padding: 0.12rem 0.45rem;
      background: var(--bg-secondary);
      border-radius: 4px;
      color: var(--text-muted);
      font-size: 0.62rem;
      font-weight: 700;
    }

    .card-visual {
      padding: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      background: var(--bg-secondary);
    }

    .card-logo {
      max-width: 68%;
      max-height: 70px;
      object-fit: contain;
      transition: transform 0.3s ease;
    }

    .channel-card:hover .card-logo { transform: scale(1.05); }

    .card-bottom { padding: 0.9rem 1rem; }

    .card-channel-name {
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: -0.01em;
    }

    .card-country {
      color: var(--text-muted);
      font-size: 0.7rem;
      margin-top: 0.15rem;
      text-transform: uppercase;
    }

    .offline-card { opacity: 0.65; }
    .offline-card:hover { opacity: 0.85; }

    .empty-category {
      padding: 2.5rem;
      text-align: center;
      background: var(--bg-card);
      border: 1px dashed var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .empty-category .icon { font-size: 2.8rem; opacity: 0.3; margin-bottom: 0.6rem; }
    .empty-category .title { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.2rem; }
    .empty-category .desc { font-size: 0.78rem; }

    /* ═══════════ FOOTER ═══════════ */
    .footer {
      text-align: center;
      padding: 2.5rem 0;
      margin-top: 3rem;
      border-top: 1px solid var(--border-color);
    }

    .footer-brand { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.3rem; }
    .footer-brand .accent { color: var(--green-500); }
    .footer-copy { color: var(--text-muted); font-size: 0.75rem; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .anim-in { animation: fadeUp 0.4s ease forwards; opacity: 0; }

    @media (max-width: 768px) {
      .container { padding: 0 1rem; }
      .header-inner {
        padding: 0.5rem 1rem;
        gap: 0.75rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      .header-spacer { display: none; }
      .header-clock { order: 3; width: 100%; justify-content: center; font-size: 0.8rem; }
      .nav-pills { width: 100%; justify-content: center; }
      .channel-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
      .hero-title { font-size: 1.7rem; }
      .quick-nav { gap: 0.3rem; }
      .quick-nav-btn { padding: 0.35rem 0.7rem; font-size: 0.72rem; }
    }
  </style>
</head>

      { name: "Canal Live 9", image: "https://thumb.canalplus.pro/http/unsafe/121x91/filters:quality(80)/canalplus-cdn.canal-plus.io/p1/channel/1143/canal-ouah/CHN43FN/CHN43FN_1143_20240910-NMYX", status: "online", quality: "HD" },

      { name: "Canal Live 12", image: "https://thumb.canalplus.pro/http/unsafe/121x91/filters:quality(80)/canalplus-cdn.canal-plus.io/p1/channel/1146/canal-ouah/CHN43FN/CHN43FN_1146_20240910-DOOZ", status: "online", quality: "HD" },
      { name: "Canal Live 13", image: "https://thumb.canalplus.pro/http/unsafe/121x91/filters:quality(80)/canalplus-cdn.canal-plus.io/p1/channel/1147/canal-ouah/CHN43FN/CHN43FN_1147_20240910-qJgY", status: "online", quality: "HD" },

      { name: "Canal Live 18", image: "https://thumb.canalplus.pro/http/unsafe/121x91/filters:quality(80)/canalplus-cdn.canal-plus.io/p1/channel/1152/canal-ouah/CHN43FN/CHN43FN_1152_20240910-yyCF", status: "online", quality: "HD" },
      { name: "Canal Live 19", image: "https://thumb.canalplus.pro/http/unsafe/121x91/filters:quality(80)/canalplus-cdn.canal-plus.io/p1/channel/1153/canal-ouah/CHN43FN/CHN43FN_1153_20240910-GuM-", status: "online", quality: "HD" },
      { name: "Eurosport 1", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Eurosport_HD_since_2015.svg/120px-Eurosport_HD_since_2015.svg.png", status: "online", quality: "HD" },
      { name: "Eurosport 2", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Eurosport_2_HD_Logo_2015.svg/1920px-Eurosport_2_HD_Logo_2015.svg.png", status: "online", quality: "HD" },
      { name: "L Equipe", image: "https://upload.wikimedia.org/wikipedia/commons/9/9b/La_cha%C3%AEne_l%27Equipe_-_logo_2016.png", status: "offline", quality: "SD" },
      { name: "RMC Sport 1", image: "https://upload.wikimedia.org/wikipedia/commons/b/bf/Logo_RMC_Sport_2018.svg", status: "online", quality: "HD" },
      { name: "RMC Sport 2", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Logo_RMC_Sport_2_2018.svg/3840px-Logo_RMC_Sport_2_2018.svg.png", status: "online", quality: "HD" },
      { name: "France 24", image: "https://upload.wikimedia.org/wikipedia/commons/8/8a/France24.png", status: "online", quality: "SD" },
      { name: "France 2", image: "https://freebox.cdn.scw.iliad.fr/2_b10cac1cb4.png", status: "online", quality: "HD" },
      { name: "France 3", image: "https://freebox.cdn.scw.iliad.fr/3_0318162f2b.png", status: "online", quality: "HD" },
      { name: "TF1", image: "https://freebox.cdn.scw.iliad.fr/1_13c8b55898.png", status: "online", quality: "HD" }
    ];

    const PLACEHOLDER_SVG = "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="120" height="48" viewBox="0 0 120 48"><rect fill="#1a221a" width="120" height="48" rx="8"/><text x="60" y="30" text-anchor="middle" fill="#6a756a" font-family="sans-serif" font-size="10" font-weight="700">SPORTLIVE</text></svg>');

    function logo(ch) { return ch.image || PLACEHOLDER_SVG; }

    const CATEGORIES = [
      { id: "canalplus", label: "Canal +", icon: "📡", match: (n) => /canal/i.test(n) },
      { id: "beinsports", label: "beIN Sports", icon: "🔥", match: (n) => /bein/i.test(n) },
      { id: "ligue1", label: "Ligue 1 +", icon: "⚽", match: (n) => /ligue\s*1\+/i.test(n) },
      { id: "dazn", label: "DAZN", icon: "🥊", match: () => false },
      { id: "autres", label: "Autres", icon: "🏆", match: (n) => /eurosport|rmc|equipe/i.test(n) },
      { id: "general", label: "Général", icon: "📺", match: (n) => /tf1|france\s*2|france\s*3|france\s*24/i.test(n) }
    ];

    function scrollToCategory(id) {
      const el = document.getElementById('cat-' + id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function renderQuickNav() {
      const nav = document.getElementById('quickNav');
      nav.innerHTML = CATEGORIES.map(c =>
        `<button class="quick-nav-btn" onclick="scrollToCategory('${c.id}')">${c.icon} ${c.label}</button>`
      ).join('');
    }

    function render() {
      const container = document.getElementById('categoriesContainer');
      let html = '';

      const onlineTotal = CHANNELS.filter(c => c.status === 'online').length;
      document.getElementById('liveGlobalCount').textContent = onlineTotal + ' chaînes en direct';

      CATEGORIES.forEach(cat => {
        const channels = CHANNELS.filter(c => cat.match(c.name));
        html += `<section class="category-section anim-in" id="cat-${cat.id}">`;
        html += '<div class="category-head">';
        html += '<div class="category-icon-block">' + cat.icon + '</div>';
        html += '<h2 class="category-title">' + cat.label + '</h2>';
        html += '<span class="category-subtitle">' + channels.length + ' chaîne' + (channels.length > 1 ? 's' : '') + '</span>';
        html += '</div>';

        if (channels.length === 0 && cat.id === 'dazn') {
          html += '<div class="empty-category">';
          html += '<div class="icon">🥊</div>';
          html += '<p class="title">Aucune chaîne DAZN disponible</p>';
          html += '<p class="desc">Revenez bientôt, de nouveaux flux arrivent.</p>';
          html += '</div>';
        } else if (channels.length > 0) {
          html += '<div class="channel-grid">';
          channels.forEach(ch => {
            const off = ch.status === 'offline';
            html += '<a href="stream.html?c=' + encodeURIComponent(ch.name) + '" class="channel-card' + (off ? ' offline-card' : '') + '">';
            html += '<div class="card-top">';
            html += '<span class="card-status' + (off ? ' off' : '') + '"><span class="status-dot' + (off ? ' off' : '') + '"></span>' + (off ? 'Hors ligne' : 'Direct') + '</span>';
            html += '<span class="quality-tag">' + ch.quality + '</span>';
            html += '</div>';
            html += '<div class="card-visual"><img class="card-logo" src="' + logo(ch) + '" alt="" loading="lazy" /></div>';
            html += '<div class="card-bottom"><div class="card-channel-name">' + ch.name + '</div><div class="card-country">France</div></div>';
            html += '</a>';
          });
          html += '</div>';
        }
        html += '</section>';
      });

      container.innerHTML = html;
    }

    // Horloge
    function updateClock() {
      const now = new Date();
      document.getElementById('headerClock').textContent =
        String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
    }
    updateClock();
    setInterval(updateClock, 30000);

    // Theme
    const themeBtn = document.getElementById('themeToggle');
    if (localStorage.getItem('sportlive_theme') === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
      themeBtn.textContent = '☀️';
    }
    themeBtn.addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
      localStorage.setItem('sportlive_theme', isDark ? 'light' : 'dark');
      themeBtn.textContent = isDark ? '☀️' : '🌙';
    });

    // Scroll
    window.addEventListener('scroll', () => {
      document.getElementById('header').classList.toggle('compact', window.scrollY > 60);
    });

    renderQuickNav();
    render();
  </script>
</body>
