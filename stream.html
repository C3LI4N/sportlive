<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Permissions-Policy" content="fullscreen=*" />
  <meta name="description" content="Direct — SPORTLIVE" />
  <title>Direct — SPORTLIVE</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' style='stop-color:%2322c55e;stop-opacity:1'/><stop offset='100%25' style='stop-color:%2316a34a;stop-opacity:1'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='url(%23g)'/><text x='50' y='66' text-anchor='middle' fill='white' font-family='Arial Black' font-size='46' font-weight='900' letter-spacing='-2'>SL</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" as="style" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-glass: rgba(16, 22, 16, 0.92);
      --green-400: #4ade80;
      --green-500: #22c55e;
      --green-subtle: rgba(34, 197, 94, 0.06);
      --text-primary: #edf5ed;
      --text-secondary: #9aa89a;
      --border-color: rgba(255,255,255,0.06);
      --gradient-header: linear-gradient(180deg, rgba(16,22,16,0.98) 0%, rgba(16,22,16,0.92) 100%);
      --radius-xs: 6px;
      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 24px;
    }

    [data-theme="light"] {
      --bg-glass: rgba(255,255,255,0.94);
      --text-primary: #1a1f1a;
      --text-secondary: #4a504a;
      --border-color: rgba(0,0,0,0.06);
      --gradient-header: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.94) 100%);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #000;
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ═══════════ HEADER ═══════════ */
    .header {
      flex-shrink: 0;
      z-index: 10;
      background: var(--gradient-header);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
    }

    .header-inner {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0.6rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .logo-link {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      text-decoration: none;
      color: var(--text-primary);
      flex-shrink: 0;
    }

    .logo-svg { width: 36px; height: 36px; flex-shrink: 0; }

    .logo-text {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .logo-text .accent { color: var(--green-500); }

    .back-link {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.85rem;
      transition: color 0.2s;
      margin-left: auto;
    }

    .back-link:hover { color: var(--green-400); }

    .channel-name-display {
      font-weight: 700;
      font-size: 1rem;
      text-align: center;
      letter-spacing: -0.01em;
    }

    .header-spacer { width: 100px; }

    /* ═══════════ PLAYER ═══════════ */
    .player-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
      padding: 0.7rem;
      min-height: 0;
    }

    .video-frame {
      flex: 1;
      background: #000;
      border-radius: var(--radius-lg);
      overflow: hidden;
      position: relative;
      min-height: 380px;
      border: 1px solid var(--border-color);
    }

    .video-frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: var(--radius-lg);
    }

    .no-stream-msg {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 380px;
      text-align: center;
      color: var(--text-secondary);
    }

    .no-stream-msg .icon { font-size: 3.5rem; margin-bottom: 0.8rem; opacity: 0.35; }
    .no-stream-msg .title { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.2rem; }

    .player-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 0.7rem 0;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 0.55rem 1.1rem;
      background: var(--bg-glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .ctrl-btn:hover { border-color: var(--green-500); background: var(--green-subtle); color: var(--green-400); }
    .ctrl-btn.active { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.4); color: var(--green-400); }
    .ctrl-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    .info-bar {
      padding: 0.8rem 1rem;
      background: var(--bg-glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      flex-shrink: 0;
      margin-top: 0.4rem;
    }

    .info-text { color: var(--text-secondary); font-size: 0.78rem; line-height: 1.5; }
    .info-text strong { color: var(--green-400); }

    @media (max-width: 768px) {
      .header-inner { padding: 0.5rem 0.75rem; gap: 0.5rem; }
      .logo-text { display: none; }
      .header-spacer { width: 30px; }
      .player-zone { padding: 0.35rem; }
      .ctrl-btn { padding: 0.45rem 0.8rem; font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo-link">
        <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="logoGradS" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#15803d;stop-opacity:1" />
            </linearGradient>
          </defs>
          <rect width="100" height="100" rx="20" fill="url(#logoGradS)"/>
          <text x="50" y="66" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="46" font-weight="900" letter-spacing="-2">SL</text>
        </svg>
        <span class="logo-text">SPORT<span class="accent">LIVE</span></span>
      </a>
      <span class="channel-name-display" id="channelTitle">Chargement...</span>
      <a href="index.html" class="back-link">← Retour</a>
    </div>
  </header>

  <main class="player-zone">
    <div class="video-frame" id="videoFrame">
      <div class="no-stream-msg" id="noStream">
        <div class="icon">📺</div>
        <div class="title">Aucun flux disponible</div>
        <p>Sélectionnez une chaîne depuis l'accueil</p>
      </div>
    </div>

    <div class="player-controls">
      <button class="ctrl-btn" id="btnPause">
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        <span>Pause</span>
      </button>
      <button class="ctrl-btn" id="btnFullscreen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        <span>Plein écran</span>
      </button>
      <button class="ctrl-btn" id="btnRefreshStream">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        <span>Actualiser</span>
      </button>
    </div>

    <div class="info-bar">
      <p class="info-text">💡 <strong>Conseil :</strong> Une connexion stable d'au moins 5 Mbps est recommandée pour une lecture fluide en HD.</p>
    </div>
  </main>

  <script>
    // ═══════════ LIENS DES FLUX (NE PAS MODIFIER) ═══════════
    const STREAM_URLS = {
      "beIN SPORTS 1": "https://lovetier.bz/player/BEINSPORT1FR",
      "beIN SPORTS 2": "https://lovetier.bz/player/BEINSPORT2FR",
      "beIN SPORTS 3": "https://lovetier.bz/player/BEINSPORT3FR",
      "beIN SPORTS MAX 4": "https://lovetier.bz/player/BEINMAX4FR",
      "beIN SPORTS MAX 5": "https://lovetier.bz/player/BEINMAX5FR",
      "beIN SPORTS MAX 6": "https://lovetier.bz/player/BEINMAX6FR",
      "beIN SPORTS MAX 7": "https://lovetier.bz/player/BEINMAX7FR",
      "beIN SPORTS MAX 8": "https://lovetier.bz/player/BEINMAX8FR",
      "beIN SPORTS MAX 9": "https://lovetier.bz/player/BEINMAX9FR",
      "beIN SPORTS MAX 10": "https://lovetier.bz/player/BEINMAX10FR",
      "Canal": "https://lovetier.bz/player/CANALPLFR",
      "Canal Sport": "https://lovetier.bz/player/CANALSPORTFR",
      "Canal Sport360": "https://lovetier.bz/player/CANALPLFR",
      "Canal Foot": "https://lovetier.bz/player/FOOTPLUSFR",
      "Ligue 1+": "https://zonalive.click/player/3/20",
      "Ligue 1+ 4": "https://zonalive.click/player/3/21",
      "Ligue 1+ 5": "https://zonalive.click/player/3/22",
      "Ligue 1+ 6": "https://zonalive.click/player/3/18",
      "Eurosport 1": "https://lovetier.bz/player/Euro1FR",
      "Eurosport 2": "https://lovetier.bz/player/Euro2FR",
      "L Equipe": "https://lovetier.bz/player/EQUIPEFR",
      "RMC Sport 1": "https://zonalive.click/player/3/17",
      "RMC Sport 2": "",
      "France 2": "https://lovetier.bz/player/France2",
      "France 3": "https://lovetier.bz/player/France3",
      "TF1": "https://zonalive.click/player/3/24",
      "Canal Live 1": "https://zonalive.click/player/3/31",
      "Canal Live 2": "https://zonalive.click/player/3/32",
      "Canal Live 3": "https://zonalive.click/player/3/33",
      "Canal Live 4": "https://zonalive.click/player/3/34",
      "Canal Live 5": "https://zonalive.click/player/3/35",
      "Canal Live 6": "https://zonalive.click/player/3/36",
      "Canal Live 7": "https://zonalive.click/player/3/37",
      "Canal Live 8": "https://zonalive.click/player/3/38",
      "Canal Live 9": "https://zonalive.click/player/3/39",
      "Canal Live 10": "https://zonalive.click/player/3/40",
      "Canal Live 11": "https://zonalive.click/player/3/41",
      "Canal Live 12": "https://zonalive.click/player/3/42",
      "Canal Live 13": "https://zonalive.click/player/3/43",
      "Canal Live 14": "https://zonalive.click/player/3/44",
      "Canal Live 15": "https://zonalive.click/player/3/45",
      "Canal Live 16": "https://zonalive.click/player/3/46",
      "Canal Live 17": "https://zonalive.click/player/3/47",
      "Canal Live 18": "https://zonalive.click/player/3/48",
      "Canal Live 19": "",
      "France 24": ""
    };

    const channel = new URLSearchParams(window.location.search).get('c') || '';
    document.getElementById('channelTitle').textContent = channel || 'SPORTLIVE';
    document.title = channel ? channel + ' — SPORTLIVE' : 'SPORTLIVE';

    const url = STREAM_URLS[channel];
    let iframe = null;
    let isPaused = false;
    let pausedSrc = '';

    if (url) {
      document.getElementById('noStream').style.display = 'none';
      iframe = document.createElement('iframe');
      iframe.src = url;
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen';
      iframe.allowFullscreen = true;
      document.getElementById('videoFrame').appendChild(iframe);
    }

    const videoFrame = document.getElementById('videoFrame');

    document.getElementById('btnPause').addEventListener('click', () => {
      if (!iframe) return;
      if (!isPaused) {
        pausedSrc = iframe.src;
        iframe.src = '';
        document.getElementById('btnPause').innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg><span>Lecture</span>';
        document.getElementById('btnPause').classList.add('active');
        isPaused = true;
      } else {
        iframe.src = pausedSrc;
        document.getElementById('btnPause').innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg><span>Pause</span>';
        document.getElementById('btnPause').classList.remove('active');
        isPaused = false;
      }
    });

    document.getElementById('btnFullscreen').addEventListener('click', () => {
      if (videoFrame.requestFullscreen) videoFrame.requestFullscreen();
    });

    document.getElementById('btnRefreshStream').addEventListener('click', () => {
      if (!iframe || !url) return;
      iframe.src = '';
      setTimeout(() => {
        iframe.src = url;
        if (isPaused) {
          isPaused = false;
          document.getElementById('btnPause').innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg><span>Pause</span>';
          document.getElementById('btnPause').classList.remove('active');
        }
      }, 200);
    });
  </script>
</body>
</html>
