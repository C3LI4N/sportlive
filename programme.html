<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Programme foot STREEMIO — Matchs à venir avec compte à rebours" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Programme — STREEMIO</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%2322c55e;stop-opacity:1'/%3E%3Cstop offset='100%25' style='stop-color:%2316a34a;stop-opacity:1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='url(%23g)'/%3E%3Ctext x='50' y='62' text-anchor='middle' fill='white' font-family='Arial Black' font-size='40' font-weight='900'%3ESM%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" as="style" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #080808;
      --paper: #0f0f0f;
      --stone: #181818;
      --stone-hover: #1f1f1f;
      --glass: rgba(15, 15, 15, 0.82);
      --emerald-400: #34d399;
      --emerald-500: #10b981;
      --emerald-mist: rgba(16, 185, 129, 0.06);
      --emerald-border: rgba(16, 185, 129, 0.12);
      --amber-400: #fbbf24;
      --amber-mist: rgba(251, 191, 36, 0.08);
      --amber-border: rgba(251, 191, 36, 0.15);
      --rose-500: #f43f5e;
      --rose-mist: rgba(244, 63, 94, 0.08);
      --text-primary: #f0f0f0;
      --text-secondary: #909090;
      --text-tertiary: #606060;
      --hairline: rgba(255, 255, 255, 0.04);
      --hairline-strong: rgba(255, 255, 255, 0.08);
      --gradient-brand: linear-gradient(135deg, #10b981 0%, #059669 100%);
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-pill: 100px;
    }

    [data-theme="light"] {
      --ink: #ebedeb;
      --paper: #f2f4f2;
      --stone: #e0e2e0;
      --stone-hover: #d8dad8;
      --glass: rgba(242, 244, 242, 0.88);
      --text-primary: #1a1a1a;
      --text-secondary: #606060;
      --text-tertiary: #888;
      --hairline: rgba(0, 0, 0, 0.05);
      --hairline-strong: rgba(0, 0, 0, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: var(--ink);
      color: var(--text-primary);
      line-height: 1.55;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--hairline);
    }

    .navbar-inner {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0.55rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .brand { display: flex; align-items: center; gap: 0.55rem; text-decoration: none; color: var(--text-primary); }
    .brand-mark { width: 34px; height: 34px; background: var(--gradient-brand); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.85rem; color: #fff; }
    .brand-text { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.03em; }
    .brand-text .accent { color: var(--emerald-500); }

    .nav-links { display: flex; gap: 0.2rem; background: var(--stone); padding: 0.2rem; border-radius: var(--radius-md); border: 1px solid var(--hairline); }
    .nav-link { padding: 0.45rem 1rem; border-radius: var(--radius-sm); color: var(--text-secondary); text-decoration: none; font-weight: 500; font-size: 0.8rem; transition: all 0.2s ease; }
    .nav-link:hover { color: var(--text-primary); }
    .nav-link.active { background: var(--emerald-mist); color: var(--emerald-400); font-weight: 600; box-shadow: 0 0 0 1px var(--emerald-border); }

    .wrapper { max-width: 900px; margin: 0 auto; padding: 0 1.25rem; }

    .page-header { text-align: center; padding: 2.5rem 0 0.5rem; }
    .page-badge { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.25rem 0.8rem; background: var(--emerald-mist); border: 1px solid var(--emerald-border); border-radius: var(--radius-pill); font-weight: 600; font-size: 0.7rem; color: var(--emerald-400); margin-bottom: 0.6rem; }
    .page-title { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; }
    .page-title .hl { background: var(--gradient-brand); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    .date-filters { display: flex; justify-content: center; gap: 0.3rem; flex-wrap: wrap; margin: 1.25rem 0; }
    .date-chip { padding: 0.4rem 0.9rem; background: var(--stone); border: 1px solid var(--hairline); border-radius: var(--radius-pill); color: var(--text-secondary); font-weight: 500; font-size: 0.75rem; font-family: inherit; cursor: pointer; transition: all 0.2s ease; }
    .date-chip:hover { border-color: var(--hairline-strong); }
    .date-chip.active { background: var(--emerald-mist); border-color: var(--emerald-border); color: var(--emerald-400); font-weight: 600; }
    .date-chip.today { background: var(--amber-mist); border-color: var(--amber-border); color: var(--amber-400); }

    .day-block { margin-bottom: 1.5rem; }
    .day-heading { font-weight: 700; font-size: 0.8rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; padding: 0.5rem 0; border-bottom: 1px solid var(--hairline); }

    .match-list { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem; }

    .match-card {
      display: grid;
      grid-template-columns: 90px 1fr auto;
      gap: 1rem;
      align-items: center;
      padding: 0.9rem 1rem;
      background: var(--stone);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-md);
      text-decoration: none;
      color: inherit;
      transition: all 0.25s ease;
    }

    .match-card:hover { background: var(--stone-hover); border-color: var(--hairline-strong); transform: translateX(3px); }
    .match-card.live { border-color: var(--emerald-border); background: var(--emerald-mist); border-left: 3px solid var(--emerald-500); }
    .match-card.passed { opacity: 0.4; }

    .match-time-col { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; }
    .match-time { font-weight: 700; font-size: 0.95rem; color: var(--emerald-400); font-variant-numeric: tabular-nums; }
    .match-card.live .match-time { color: var(--rose-500); }
    .match-card.passed .match-time { color: var(--text-tertiary); }

    .countdown-badge { padding: 0.15rem 0.5rem; border-radius: var(--radius-pill); font-size: 0.62rem; font-weight: 700; letter-spacing: 0.02em; }
    .countdown-badge.upcoming { background: var(--amber-mist); color: var(--amber-400); }
    .countdown-badge.live-badge { background: var(--rose-mist); color: var(--rose-500); animation: pulseBadge 2s infinite; }
    @keyframes pulseBadge { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    .countdown-badge.ended { background: var(--stone); color: var(--text-tertiary); }

    .match-teams { display: flex; align-items: center; gap: 0.5rem; }
    .team-name { font-weight: 600; font-size: 0.85rem; }
    .team-vs { color: var(--text-tertiary); font-size: 0.75rem; margin: 0 0.3rem; }

    .match-meta { display: flex; align-items: center; gap: 0.6rem; }
    .comp-tag { padding: 0.2rem 0.6rem; background: var(--emerald-mist); border: 1px solid var(--emerald-border); border-radius: var(--radius-pill); font-size: 0.65rem; color: var(--emerald-400); font-weight: 600; }
    .channel-info { display: flex; align-items: center; gap: 0.35rem; color: var(--text-secondary); font-size: 0.72rem; }
    .channel-info img { height: 16px; object-fit: contain; }
    .arrow { color: var(--emerald-400); font-weight: 700; }

    .footer { text-align: center; padding: 2rem 0; margin-top: 3rem; border-top: 1px solid var(--hairline); }
    .footer-brand { font-size: 1rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.15rem; }
    .footer-brand .accent { color: var(--emerald-500); }
    .footer-note { color: var(--text-tertiary); font-size: 0.6rem; }

    @media (max-width: 768px) {
      .wrapper { padding: 0 0.75rem; }
      .navbar-inner { padding: 0.4rem 0.6rem; gap: 0.5rem; flex-wrap: wrap; justify-content: space-between; }
      .nav-links { order: 2; width: 100%; justify-content: center; }
      .match-card { grid-template-columns: 1fr; gap: 0.5rem; text-align: center; }
      .match-time-col { flex-direction: row; justify-content: center; gap: 0.4rem; }
      .match-teams { justify-content: center; }
      .match-meta { justify-content: center; flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="brand">
        <div class="brand-mark">SM</div>
        <span class="brand-text">STREEM<span class="accent">IO</span></span>
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Chaînes</a>
        <a href="programme.html" class="nav-link active">Programme</a>
      </div>
    </div>
  </nav>

  <main class="wrapper">
    <header class="page-header">
      <div class="page-badge">📅 Prochainement</div>
      <h1 class="page-title">Programme <span class="hl">Foot</span></h1>
    </header>
    <div class="date-filters" id="dateFilters"></div>
    <div id="programContent"></div>
  </main>

  <footer class="footer">
    <p class="footer-brand">STREEM<span class="accent">IO</span></p>
    <p class="footer-note">© 2026 — Streaming sportif gratuit</p>
  </footer>

  <script defer>
    const PROGRAMMES = [
      { comp: "UCL", home: "Arsenal", away: "Atlético", day: "2026-05-05", time: "21:00", channel: "Canal Foot" },
      { comp: "D1F", home: "Lyon", away: "Montpellier", day: "2026-05-06", time: "17:00", channel: "Canal Sport360" },
      { comp: "D1F", home: "PSG", away: "Strasbourg", day: "2026-05-06", time: "17:00", channel: "Canal Foot" },
      { comp: "UCL", home: "Bayern", away: "PSG", day: "2026-05-06", time: "21:00", channel: "Canal" },
      { comp: "Europa", home: "Aston Villa", away: "Nottingham", day: "2026-05-07", time: "21:00", channel: "Canal Foot" },
      { comp: "Bundesliga", home: "Dortmund", away: "Frankfurt", day: "2026-05-08", time: "20:30", channel: "beIN SPORTS 2" },
      { comp: "Ligue 1", home: "Lens", away: "Nantes", day: "2026-05-08", time: "20:45", channel: "Ligue 1+" },
      { comp: "Premier League", home: "Liverpool", away: "Chelsea", day: "2026-05-09", time: "13:30", channel: "Canal" },
      { comp: "Premier League", home: "Man City", away: "Brentford", day: "2026-05-09", time: "18:30", channel: "Canal Foot" },
      { comp: "Ligue 2", home: "ASSE", away: "Amiens", day: "2026-05-09", time: "20:00", channel: "beIN SPORTS 1" },
      { comp: "Liga", home: "Real Sociedad", away: "Betis", day: "2026-05-09", time: "21:00", channel: "beIN SPORTS MAX 9" }
    ];

    const CHANNEL_LOGOS = {
      "Canal Foot": "https://freebox.cdn.scw.iliad.fr/2023_07_24_RVB_LOGO_CANALPLUS_FOOT_581adea3dd.png",
      "Canal Sport360": "https://freebox.cdn.scw.iliad.fr/2023_07_24_RVB_LOGO_CANALPLUS_SPORT_360_7772de4eea.png",
      "Canal": "https://freebox.cdn.scw.iliad.fr/4_5086f4334d.png",
      "beIN SPORTS 1": "https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_1_134e751711.png",
      "beIN SPORTS 2": "https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_2_7cb5d3a006.png",
      "Ligue 1+": "https://freebox.cdn.scw.iliad.fr/large_LFP_LOGOTYPE_L1_MASTER_ELECTRIC_BLUE_RVB_2_5e790f2852.png",
      "beIN SPORTS MAX 9": "https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_MAX_9_17ef74743f.png"
    };

    const CHANNEL_MAP = { "Canal+ Foot": "Canal Foot", "Canal+ Sport 360": "Canal Sport360", "Canal+": "Canal" };
    function streamName(ch) { return CHANNEL_MAP[ch] || ch; }
    function streamUrl(ch) { return 'stream.html?c=' + encodeURIComponent(streamName(ch)); }
    function logo(ch) { return CHANNEL_LOGOS[ch] || ''; }

    const todayISO = new Date().toISOString().slice(0, 10);
    let activeDay = todayISO;
    const days = [...new Set(PROGRAMMES.map(p => p.day))].sort();

    function fmtShort(iso) { return new Date(iso + 'T12:00:00').toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' }); }
    function fmtFull(iso) { const d = new Date(iso + 'T12:00:00').toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' }); return d.charAt(0).toUpperCase() + d.slice(1); }

    function getCountdown(dayISO, timeStr) {
      const [h, m] = timeStr.split(':').map(Number);
      const matchDate = new Date(dayISO + 'T' + timeStr + ':00');
      const now = new Date();
      const diff = matchDate - now;
      if (diff <= 0 && Math.abs(diff) < 2.5 * 60 * 60 * 1000) return { status: 'live', text: 'Direct' };
      if (diff < 0) return { status: 'passed', text: 'Terminé' };
      if (diff > 24 * 60 * 60 * 1000) return { status: 'future', text: '' };
      const hrs = Math.floor(diff / (1000 * 60 * 60));
      const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      if (hrs > 0) return { status: 'upcoming', text: hrs + 'h ' + (mins > 0 ? mins + 'm' : '') };
      return { status: 'upcoming', text: mins + ' min' };
    }

    function renderFilters() {
      const el = document.getElementById('dateFilters');
      el.innerHTML = '<button class="date-chip' + (activeDay === null ? ' active' : '') + '" onclick="setDay(null)">Tous</button>';
      days.forEach(d => {
        const isToday = d === todayISO;
        el.innerHTML += '<button class="date-chip' + (activeDay === d ? ' active' : '') + (isToday ? ' today' : '') + '" onclick="setDay(\'' + d + '\')">' + fmtShort(d) + (isToday ? ' ✦' : '') + '</button>';
      });
    }

    function setDay(d) { activeDay = d; renderFilters(); renderProgram(); }

    function renderProgram() {
      const el = document.getElementById('programContent');
      let filtered = PROGRAMMES.filter(p => !activeDay || p.day === activeDay);
      filtered.sort((a, b) => (a.day + a.time).localeCompare(b.day + b.time));
      let html = '', prevDay = null;
      filtered.forEach(p => {
        if (p.day !== prevDay) { if (prevDay) html += '</div></div>'; prevDay = p.day; html += '<div class="day-block"><div class="day-heading">' + fmtFull(p.day) + '</div><div class="match-list">'; }
        const cd = getCountdown(p.day, p.time);
        let cls = 'match-card';
        if (cd.status === 'live') cls += ' live';
        if (cd.status === 'passed') cls += ' passed';
        let badgeHtml = '';
        if (cd.status === 'upcoming' && cd.text) badgeHtml = '<span class="countdown-badge upcoming">' + cd.text + '</span>';
        if (cd.status === 'live') badgeHtml = '<span class="countdown-badge live-badge">● Direct</span>';
        if (cd.status === 'passed') badgeHtml = '<span class="countdown-badge ended">Terminé</span>';
        const l = logo(p.channel);
        html += `<a href="${streamUrl(p.channel)}" class="${cls}">
          <div class="match-time-col"><span class="match-time">${p.time}</span>${badgeHtml}</div>
          <div class="match-teams"><span class="team-name">${p.home}</span><span class="team-vs">—</span><span class="team-name">${p.away}</span></div>
          <div class="match-meta"><span class="comp-tag">${p.comp}</span><span class="channel-info">${l ? '<img src="'+l+'" alt="" />' : ''}${p.channel}</span><span class="arrow">→</span></div>
        </a>`;
      });
      if (prevDay) html += '</div></div>';
      el.innerHTML = html;
      clearTimeout(window._cdTimer);
      window._cdTimer = setTimeout(renderProgram, 30000);
    }

    renderFilters();
    renderProgram();
  </script>
</body>
</html>
