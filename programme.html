  <style>
    :root {
      --bg-deep: #080c08;
      --bg-primary: #0e130e;
      --bg-secondary: #141a14;
      --bg-card: #1a221a;
      --bg-card-hover: #1f281f;
      --bg-glass: rgba(16, 22, 16, 0.9);
      
      --green-400: #4ade80;
      --green-500: #22c55e;
      --green-600: #16a34a;
      --green-subtle: rgba(34, 197, 94, 0.06);
      --green-border: rgba(34, 197, 94, 0.16);
      
      --orange-400: #fb923c;
      --orange-subtle: rgba(251, 146, 60, 0.08);
      
      --red-500: #ef4444;
      
      --text-primary: #edf5ed;
      --text-secondary: #9aa89a;
      --text-muted: #6a756a;
      
      --border-color: rgba(255, 255, 255, 0.05);
      --border-strong: rgba(255, 255, 255, 0.1);
      
      --gradient-brand: linear-gradient(135deg, #22c55e 0%, #16a34a 50%, #15803d 100%);
      --gradient-header: linear-gradient(180deg, rgba(16,22,16,0.98) 0%, rgba(16,22,16,0.92) 100%);
      
      --radius-xs: 6px;
      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 24px;
    }

    [data-theme="light"] {
      --bg-deep: #f0f4f0;
      --bg-primary: #f7faf7;
      --bg-secondary: #edf1ed;
      --bg-card: #ffffff;
      --bg-card-hover: #f5f8f5;
      --bg-glass: rgba(255, 255, 255, 0.92);
      
      --text-primary: #1a1f1a;
      --text-secondary: #4a504a;
      --text-muted: #7a807a;
      
      --border-color: rgba(0, 0, 0, 0.06);
      --border-strong: rgba(0, 0, 0, 0.1);
      --gradient-header: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.94) 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .bg-texture {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.015;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(34,197,94,0.5) 0px, transparent 1px),
        radial-gradient(circle at 70% 60%, rgba(74,222,128,0.4) 0px, transparent 1px);
      background-size: 80px 80px, 100px 100px;
    }

    /* ═══════════ HEADER REDESIGNÉ ═══════════ */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--gradient-header);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
    }

    .header-inner {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0.6rem 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    /* Logo */
    .logo-link {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      text-decoration: none;
      color: var(--text-primary);
      flex-shrink: 0;
    }

    .logo-svg {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .logo-text .accent {
      color: var(--green-500);
    }

    /* Navigation */
    .nav-pills {
      display: flex;
      gap: 0.15rem;
      background: var(--bg-secondary);
      padding: 0.2rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-color);
    }

    .nav-pill {
      padding: 0.5rem 1.1rem;
      border-radius: var(--radius-xs);
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.83rem;
      transition: all 0.2s ease;
    }

    .nav-pill:hover { color: var(--text-primary); background: var(--bg-card-hover); }
    .nav-pill.active { background: var(--green-subtle); color: var(--green-400); font-weight: 600; }

    /* Espaceur */
    .header-spacer {
      flex: 1;
    }

    /* Horloge */
    .header-clock {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-primary);
      font-weight: 600;
      font-size: 0.9rem;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      background: var(--bg-secondary);
      padding: 0.4rem 0.9rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-color);
      white-space: nowrap;
    }

    .header-clock svg {
      width: 15px;
      height: 15px;
      color: var(--green-400);
      flex-shrink: 0;
    }

    .header-clock .time {
      color: var(--green-400);
      font-weight: 700;
    }

    /* Actions */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .theme-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 0.45rem 0.6rem;
      cursor: pointer;
      font-size: 1rem;
      color: var(--text-primary);
      transition: all 0.2s ease;
    }

    .theme-btn:hover { border-color: var(--green-500); background: var(--bg-card-hover); }

    /* ═══════════ CONTENU ═══════════ */
    .container {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .page-head {
      text-align: center;
      padding: 2.5rem 0 1.5rem;
    }

    .page-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--green-subtle);
      border: 1px solid var(--green-border);
      padding: 0.3rem 0.9rem;
      border-radius: 100px;
      font-weight: 600;
      font-size: 0.75rem;
      color: var(--green-400);
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .live-dot {
      width: 7px; height: 7px;
      background: var(--green-500);
      border-radius: 50%;
      animation: livePulse 2s infinite;
    }

    @keyframes livePulse {
      0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(34,197,94,0.7); }
      50% { opacity:0.5; box-shadow:0 0 0 8px rgba(34,197,94,0); }
    }

    .page-title {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin-bottom: 0.4rem;
    }

    .page-title .highlight {
      background: var(--gradient-brand);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .page-sub {
      font-size: 0.95rem;
      color: var(--text-secondary);
    }

    .date-filters {
      display: flex;
      justify-content: center;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      padding: 0.3rem 0;
    }

    .date-chip {
      padding: 0.55rem 1.1rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.82rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .date-chip:hover { border-color: var(--border-strong); color: var(--text-primary); }
    .date-chip.active {
      background: var(--green-subtle);
      border-color: var(--green-border);
      color: var(--green-400);
      font-weight: 600;
    }

    .date-chip.today {
      border-color: rgba(251, 146, 60, 0.25);
      background: var(--orange-subtle);
      color: var(--orange-400);
    }

    /* ═══════════ JOURS ═══════════ */
    .day-block {
      margin-bottom: 1.5rem;
    }

    .day-label {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 0;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .day-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }

    /* ═══════════ MATCHS ═══════════ */
    .match-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .match-card {
      display: grid;
      grid-template-columns: 110px 1fr auto;
      gap: 1rem;
      align-items: center;
      padding: 1rem 1.2rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      text-decoration: none;
      color: inherit;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .match-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-strong);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      transform: translateX(3px);
    }

    /* Match en direct */
    .match-card.live {
      border-color: var(--green-border);
      background: var(--green-subtle);
    }

    .match-card.live::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--gradient-brand);
      border-radius: 0 3px 3px 0;
      animation: livePulse 2s infinite;
    }

    /* Match passé */
    .match-card.passed {
      opacity: 0.45;
    }

    .match-card.passed:hover { opacity: 0.65; }

    /* Colonne heure + compte à rebours */
    .match-time-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .match-time {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--green-400);
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }

    .match-card.live .match-time {
      color: var(--red-500);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .match-card.passed .match-time { color: var(--text-muted); }

    /* Badge compte à rebours */
    .countdown-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.25rem 0.6rem;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .countdown-badge.upcoming {
      background: var(--orange-subtle);
      color: var(--orange-400);
      border: 1px solid rgba(251, 146, 60, 0.2);
    }

    .countdown-badge.live-now {
      background: rgba(239, 68, 68, 0.12);
      color: #fff;
      border: 1px solid rgba(239, 68, 68, 0.3);
      animation: livePulseSoft 2s infinite;
    }

    @keyframes livePulseSoft {
      0%,100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .countdown-badge.passed-badge {
      background: var(--bg-secondary);
      color: var(--text-muted);
      border: 1px solid var(--border-color);
    }

    /* Équipes */
    .match-teams {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      min-width: 0;
    }

    .team-name {
      font-weight: 600;
      font-size: 0.9rem;
    }

    .vs-divider {
      color: var(--text-muted);
      font-weight: 400;
      font-size: 0.8rem;
      margin: 0 0.35rem;
      flex-shrink: 0;
    }

    /* Métadonnées */
    .match-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .comp-tag {
      padding: 0.3rem 0.75rem;
      background: var(--green-subtle);
      border: 1px solid var(--green-border);
      border-radius: 100px;
      font-size: 0.7rem;
      color: var(--green-400);
      font-weight: 600;
      white-space: nowrap;
    }

    .channel-tag {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-secondary);
      font-size: 0.78rem;
      font-weight: 500;
    }

    .channel-tag img {
      height: 18px;
      width: auto;
      object-fit: contain;
      border-radius: 3px;
    }

    .arrow-icon {
      color: var(--green-400);
      font-weight: 700;
      margin-left: 0.4rem;
    }

    /* ═══════════ FOOTER ═══════════ */
    .footer {
      text-align: center;
      padding: 2.5rem 0;
      margin-top: 3rem;
      border-top: 1px solid var(--border-color);
    }

    .footer-brand { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.3rem; }
    .footer-brand .accent { color: var(--green-500); }
    .footer-copy { color: var(--text-muted); font-size: 0.75rem; }

    /* ═══════════ RESPONSIVE ═══════════ */
    @media (max-width: 768px) {
      .container { padding: 0 1rem; }
      .header-inner {
        padding: 0.5rem 1rem;
        gap: 0.75rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      .header-spacer { display: none; }
      .header-clock { order: 3; width: 100%; justify-content: center; font-size: 0.8rem; }
      .nav-pills { width: 100%; justify-content: center; }
      .page-title { font-size: 1.6rem; }
      .match-card { grid-template-columns: 1fr; gap: 0.5rem; text-align: center; }
      .match-time-col { flex-direction: row; justify-content: center; gap: 0.5rem; }
      .match-teams { justify-content: center; flex-wrap: wrap; }
      .match-meta { justify-content: center; flex-wrap: wrap; }
    }

    @media (max-width: 480px) {
      .header-inner { gap: 0.4rem; }
      .logo-text { font-size: 1.1rem; }
      .nav-pill { padding: 0.4rem 0.7rem; font-size: 0.75rem; }
      .match-card { padding: 0.75rem; }
      .comp-tag { font-size: 0.65rem; padding: 0.2rem 0.5rem; }
    }
  </style>
</head>

      { comp: "Liga", home: "Real Sociedad", away: "Real Betis", day: "2026-05-09", time: "21:00", channel: "beIN SPORTS MAX 9" }
    ];

    const CHANNEL_LOGOS = {
      "Canal Foot": "https://freebox.cdn.scw.iliad.fr/2023_07_24_RVB_LOGO_CANALPLUS_FOOT_581adea3dd.png",
      "Canal Sport360": "https://freebox.cdn.scw.iliad.fr/2023_07_24_RVB_LOGO_CANALPLUS_SPORT_360_7772de4eea.png",
      "Canal": "https://freebox.cdn.scw.iliad.fr/4_5086f4334d.png",
      "beIN SPORTS 1": "https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_1_134e751711.png",
      "beIN SPORTS 2": "https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_2_7cb5d3a006.png",
      "beIN SPORTS MAX 4": "https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_MAX_4_c3c337c2ff.png",
      "beIN SPORTS MAX 5": "https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_MAX_5_ce5871fc49.png",
      "beIN SPORTS MAX 6": "https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_MAX_6_50f4830f78.png",
      "beIN SPORTS MAX 7": "https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_MAX_7_6ebdb0a7d8.png",
      "beIN SPORTS MAX 9": "https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_MAX_9_17ef74743f.png",
      "beIN SPORTS MAX 10": "https://freebox.cdn.scw.iliad.fr/large_be_INSPORTSMAX_10_1ddd01afda.png",
      "Ligue 1+": "https://freebox.cdn.scw.iliad.fr/large_LFP_LOGOTYPE_L1_MASTER_ELECTRIC_BLUE_RVB_2_5e790f2852.png",
      "Canal Live 1": "https://thumb.canalplus.pro/http/unsafe/121x91/filters:quality(80)/canalplus-cdn.canal-plus.io/p1/channel/1135/canal-ouah/CHN43FN/CHN43FN_1135_10092024-cEcG",
      "Canal Live 2": "https://thumb.canalplus.pro/http/unsafe/121x91/filters:quality(80)/canalplus-cdn.canal-plus.io/p1/channel/1136/canal-ouah/CHN43FN/CHN43FN_1136_20240910-MzpB",
      "Canal Live 5": "https://thumb.canalplus.pro/http/unsafe/121x91/filters:quality(80)/canalplus-cdn.canal-plus.io/p1/channel/1139/canal-ouah/CHN43FN/CHN43FN_1139_20240910-YQYG",
      "Canal Live 6": "https://thumb.canalplus.pro/http/unsafe/121x91/filters:quality(80)/canalplus-cdn.canal-plus.io/p1/channel/1140/canal-ouah/CHN43FN/CHN43FN_1140_20240910-MO4V"
    };

    const CHANNEL_MAP = {
      "Canal+ Foot": "Canal Foot",
      "Canal+ Sport 360": "Canal Sport360",
      "Canal+": "Canal",
      "Canal+ Live 1": "Canal Live 1",
      "Canal+ Live 2": "Canal Live 2",
      "Canal+ Live 5": "Canal Live 5",
      "Canal+ Live 6": "Canal Live 6"
    };

    function getStreamChannelName(ch) { return CHANNEL_MAP[ch] || ch; }
    function getStreamUrl(ch) { return 'stream.html?c=' + encodeURIComponent(getStreamChannelName(ch)); }
    function getLogo(ch) { return CHANNEL_LOGOS[ch] || ''; }

    // ═══════════ ÉTAT ═══════════
    const todayISO = new Date().toISOString().slice(0, 10);
    let activeDay = todayISO; // ← OUVERTURE DIRECTE SUR AUJOURD'HUI
    const days = [...new Set(PROGRAMMES.map(p => p.day))].sort();

    // ═══════════ HORLOGE ═══════════
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('headerClock').textContent = h + ':' + m;
    }
    updateClock();
    setInterval(updateClock, 30000); // Rafraîchit toutes les 30s

    // ═══════════ COMPTE À REBOURS ═══════════
    function getCountdownInfo(dayISO, timeStr) {
      const [h, m] = timeStr.split(':').map(Number);
      const matchDate = new Date(dayISO + 'T' + timeStr + ':00');
      const now = new Date();
      const diff = matchDate - now;

      // Match en cours (commencé depuis moins de 2h30)
      if (diff <= 0 && Math.abs(diff) < 2.5 * 60 * 60 * 1000) {
        return { status: 'live', text: 'En direct' };
      }

      // Match terminé
      if (diff < 0) {
        return { status: 'passed', text: 'Terminé' };
      }

      // Dans plus de 24h : pas de compte à rebours
      if (diff > 24 * 60 * 60 * 1000) {
        return { status: 'future', text: '' };
      }

      // Compte à rebours
      const hours = Math.floor(diff / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

      if (hours > 0) {
        return { status: 'upcoming', text: '⏳ ' + hours + 'h ' + (minutes > 0 ? minutes + 'm' : '') };
      }
      return { status: 'upcoming', text: '⏳ ' + minutes + ' min' };
    }

    // ═══════════ AFFICHAGE ═══════════
    function fmtShort(iso) {
      return new Date(iso + 'T12:00:00').toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });
    }

    function fmtFull(iso) {
      const d = new Date(iso + 'T12:00:00').toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
      return d.charAt(0).toUpperCase() + d.slice(1);
    }

    function renderFilters() {
      const el = document.getElementById('dateFilters');
      el.innerHTML = '<button class="date-chip' + (activeDay === null ? ' active' : '') + '" onclick="setDay(null)">📅 Tous</button>';
      days.forEach(d => {
        const isToday = d === todayISO;
        el.innerHTML += '<button class="date-chip' + (activeDay === d ? ' active' : '') + (isToday ? ' today' : '') + '" onclick="setDay(\'' + d + '\')">' + fmtShort(d) + (isToday ? ' ✨' : '') + '</button>';
      });
    }

    function setDay(d) { activeDay = d; renderFilters(); renderProgram(); }

    function renderProgram() {
      const el = document.getElementById('programContent');
      let filtered = PROGRAMMES.filter(p => !activeDay || p.day === activeDay);
      filtered.sort((a, b) => (a.day + a.time).localeCompare(b.day + b.time));

      let html = '';
      let prevDay = null;

      filtered.forEach(p => {
        if (p.day !== prevDay) {
          if (prevDay !== null) html += '</div></div>';
          prevDay = p.day;
          html += '<div class="day-block"><div class="day-label">' + fmtFull(p.day) + '</div><div class="match-list">';
        }

        const cd = getCountdownInfo(p.day, p.time);
        let cardClass = 'match-card';
        let timeColHtml = '';
        let badgeHtml = '';

        if (cd.status === 'live') {
          cardClass = 'match-card live';
          timeColHtml = '<span class="match-time">En direct</span>';
          badgeHtml = '<span class="countdown-badge live-now">🔴 Direct</span>';
        } else if (cd.status === 'passed') {
          cardClass = 'match-card passed';
          timeColHtml = '<span class="match-time">' + p.time + '</span>';
          badgeHtml = '<span class="countdown-badge passed-badge">Terminé</span>';
        } else if (cd.status === 'upcoming' && cd.text) {
          timeColHtml = '<span class="match-time">' + p.time + '</span>';
          badgeHtml = '<span class="countdown-badge upcoming">' + cd.text + '</span>';
        } else {
          timeColHtml = '<span class="match-time">' + p.time + '</span>';
        }

        const logo = getLogo(p.channel);
        html += `
          <a href="${getStreamUrl(p.channel)}" class="${cardClass}">
            <div class="match-time-col">
              ${timeColHtml}
              ${badgeHtml}
            </div>
            <div class="match-teams">
              <span class="team-name">${p.home}</span>
              <span class="vs-divider">—</span>
              <span class="team-name">${p.away}</span>
            </div>
            <div class="match-meta">
              <span class="comp-tag">${p.comp}</span>
              <span class="channel-tag">
                ${logo ? '<img src="' + logo + '" alt="" loading="lazy" width="40" height="18" />' : ''}
                ${p.channel}
              </span>
              <span class="arrow-icon">→</span>
            </div>
          </a>`;
      });

      if (prevDay !== null) html += '</div></div>';
      el.innerHTML = html;

      // Rafraîchir les comptes à rebours toutes les 30s
      clearTimeout(window._countdownTimer);
      window._countdownTimer = setTimeout(renderProgram, 30000);
    }

    // ═══════════ THEME ═══════════
    const themeBtn = document.getElementById('themeToggle');
    if (localStorage.getItem('sportlive_theme') === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
      themeBtn.textContent = '☀️';
    }
    themeBtn.addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
      localStorage.setItem('sportlive_theme', isDark ? 'light' : 'dark');
      themeBtn.textContent = isDark ? '☀️' : '🌙';
    });

    // ═══════════ INIT ═══════════
    renderFilters();
    renderProgram();
  </script>
