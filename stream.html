<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta http-equiv="Permissions-Policy" content="fullscreen=*" />
  <meta name="theme-color" content="#000000" />
  <title>Direct — NovaPlay</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='100%25' x2='100%25' y2='0%25'%3E%3Cstop offset='0%25' style='stop-color:%23a855f7'/%3E%3Cstop offset='100%25' style='stop-color:%236365f1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='46' fill='url(%23g)'/%3E%3Ctext x='50' y='66' text-anchor='middle' fill='white' font-family='sans-serif' font-size='48' font-weight='900'%3EN%3C/text%3E%3Ccircle cx='50' cy='50' r='12' fill='none' stroke='white' stroke-width='2' opacity='0.6'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --glass:rgba(10,10,10,0.9); --violet:#a855f7; --violet-smudge:rgba(168,85,247,0.04);
      --text:#f0f0f0; --text2:#999; --line:rgba(255,255,255,0.04);
      --r-sm:8px; --r-md:14px; --r-full:100px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Space Grotesk',sans-serif; background:#000; color:var(--text); height:100vh; height:100dvh; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; overflow:hidden; }
    .topbar { flex-shrink:0; background:var(--glass); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-bottom:1px solid var(--line); padding:0.4rem 0; }
    .topbar-inner { max-width:1100px; margin:0 auto; padding:0 1rem; display:flex; align-items:center; justify-content:space-between; }
    .back-btn { display:flex; align-items:center; gap:0.25rem; color:var(--text2); text-decoration:none; font-weight:500; font-size:0.72rem; }
    .back-btn:hover { color:var(--violet); }

    .player-zone { flex:1; display:flex; flex-direction:column; max-width:1100px; margin:0 auto; width:100%; padding:0.3rem; min-height:0; }
    .video-box { flex:1; background:#000; border-radius:var(--r-md); overflow:hidden; position:relative; min-height:260px; border:1px solid var(--line); aspect-ratio:16/9; max-height:calc(100vh - 250px); }
    .video-box:fullscreen { border-radius:0; border:none; max-height:none; aspect-ratio:auto; }
    .video-box:-webkit-full-screen { border-radius:0; border:none; max-height:none; aspect-ratio:auto; }
    .zoom-wrap { position:absolute; inset:-40px 0 0 0; overflow:hidden; }
    .zoom-wrap iframe { position:absolute; top:0; left:50%; width:104%; height:calc(100%+40px); transform:translate(-50%,0); border:none; }
    .no-feed { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align:center; color:var(--text2); position:absolute; inset:0; z-index:1; }
    .no-feed .icon { font-size:2.5rem; opacity:0.1; margin-bottom:0.3rem; }
    .no-feed .title { font-size:0.85rem; font-weight:600; color:var(--text); }

    .source-row { display:flex; align-items:center; justify-content:center; gap:0.3rem; padding:0.35rem 0; flex-shrink:0; }
    .src-btn { display:inline-flex; align-items:center; gap:0.2rem; padding:0.35rem 0.75rem; background:var(--glass); backdrop-filter:blur(8px); border:1px solid var(--line); border-radius:var(--r-full); color:var(--text2); font-family:inherit; font-size:0.62rem; font-weight:500; cursor:pointer; transition:all 0.2s; }
    .src-btn:hover { border-color:var(--violet); color:var(--text); }
    .src-btn.active { background:rgba(168,85,247,0.1); border-color:rgba(168,85,247,0.3); color:var(--violet); }
    .src-btn:disabled { opacity:0.3; cursor:not-allowed; }

    .ch-display { display:flex; align-items:center; gap:0.6rem; padding:0.6rem 0.9rem; background:var(--glass); backdrop-filter:blur(12px); border:1px solid var(--line); border-radius:var(--r-md); margin:0.3rem 0; flex-shrink:0; }
    .ch-display-logo { width:36px; height:36px; border-radius:8px; object-fit:contain; background:#111; }
    .ch-display-name { font-weight:600; font-size:0.85rem; }

    .controls { display:flex; align-items:center; justify-content:center; gap:0.3rem; padding:0.35rem 0; flex-shrink:0; flex-wrap:wrap; }
    .ctrl { display:inline-flex; align-items:center; gap:0.2rem; padding:0.35rem 0.75rem; background:var(--glass); backdrop-filter:blur(8px); border:1px solid var(--line); border-radius:var(--r-full); color:var(--text); font-family:inherit; font-size:0.68rem; font-weight:500; cursor:pointer; transition:all 0.2s; }
    .ctrl:hover { border-color:var(--violet); background:var(--violet-smudge); color:var(--violet); }
    .ctrl.on { background:rgba(168,85,247,0.1); border-color:rgba(168,85,247,0.25); color:var(--violet); }
    .ctrl svg { width:13px; height:13px; }

    .tip { padding:0.4rem 0.65rem; background:var(--glass); border-radius:var(--r-md); flex-shrink:0; margin-top:0.15rem; }
    .tip p { color:var(--text2); font-size:0.6rem; }
    .tip strong { color:var(--violet); }

    @media (max-width:768px) { .player-zone{padding:0.2rem} .video-box{border-radius:var(--r-sm);min-height:220px} .ctrl{padding:0.3rem 0.6rem;font-size:0.64rem} }
    @media (max-width:380px) { .ctrl span{display:none} .ctrl{padding:0.35rem} .ctrl svg{width:15px;height:15px} }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="javascript:history.back()" class="back-btn">← Retour</a>
      <span style="font-weight:600;font-size:0.8rem;">NovaPlay</span>
      <div style="width:50px;"></div>
    </div>
  </header>

  <main class="player-zone">
    <div class="video-box" id="videoBox"><div class="no-feed" id="noFeed"><div class="icon">📺</div><div class="title">Aucun flux</div></div></div>

    <div class="source-row">
      <button class="src-btn active" id="s1" onclick="switchSource(1)">📡 S1</button>
      <button class="src-btn" id="s2" onclick="switchSource(2)">📡 S2</button>
    </div>

    <div class="ch-display">
      <img class="ch-display-logo" id="chLogo" src="" alt="" style="display:none;" />
      <div class="ch-display-name" id="chName">Chargement...</div>
    </div>

    <div class="controls">
      <button class="ctrl" id="btnPause"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg><span>Pause</span></button>
      <button class="ctrl" id="btnFS"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg><span>Plein écran</span></button>
      <button class="ctrl" id="btnRefresh"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg><span>Actualiser</span></button>
    </div>

    <div class="tip"><p>💡 <strong>Conseil :</strong> Connexion ≥ 5 Mbps. Changez de source si le flux est lent.</p></div>
  </main>

  <script defer>
    const STREAM_SOURCES = {
      "beIN SPORTS 1":{1:"https://mapple.uk/live-tv-premium/116",2:{type:"embed",code:'<iframe src="https://tv247.us/embed/bein-sports-1-france/" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>'}},
      "beIN SPORTS 2":{1:"https://mapple.uk/live-tv-premium/117",2:""},
      "beIN SPORTS 3":{1:"https://mapple.uk/live-tv-premium/118",2:""},
      "beIN SPORTS MAX 4":{1:"https://mapple.uk/live-tv-premium/494",2:""},
      "beIN SPORTS MAX 5":{1:"https://mapple.uk/live-tv-premium/495",2:""},
      "beIN SPORTS MAX 6":{1:"https://mapple.uk/live-tv-premium/496",2:""},
      "beIN SPORTS MAX 7":{1:"https://mapple.uk/live-tv-premium/497",2:""},
      "beIN SPORTS MAX 8":{1:"https://mapple.uk/live-tv-premium/498",2:""},
      "beIN SPORTS MAX 9":{1:"https://mapple.uk/live-tv-premium/499",2:""},
      "beIN SPORTS MAX 10":{1:"https://mapple.uk/live-tv-premium/500",2:""},
      "Canal":{1:"https://mapple.uk/live-tv-premium/121",2:""},
      "Canal Sport":{1:"https://mapple.uk/live-tv-premium/122",2:""},
      "Canal Sport360":{1:"https://mapple.uk/live-tv-premium/464",2:""},
      "Canal Foot":{1:"https://mapple.uk/live-tv-premium/463",2:""},
      "Ligue 1+":{1:"https://mapple.uk/live-tv-premium/960",2:""},
      "Eurosport 1":{1:"https://mapple.uk/live-tv-premium/772",2:""},
      "Eurosport 2":{1:"https://mapple.uk/live-tv-premium/773",2:""},
      "RMC Sport 1":{1:"https://mapple.uk/live-tv-premium/119",2:""}
    };
    const CHANNEL_LOGOS = {
      "beIN SPORTS 1":"https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_1_134e751711.png",
      "beIN SPORTS 2":"https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_2_7cb5d3a006.png",
      "Canal":"https://freebox.cdn.scw.iliad.fr/4_5086f4334d.png",
      "Canal Foot":"https://freebox.cdn.scw.iliad.fr/2023_07_24_RVB_LOGO_CANALPLUS_FOOT_581adea3dd.png",
      "Ligue 1+":"https://freebox.cdn.scw.iliad.fr/large_LFP_LOGOTYPE_L1_MASTER_ELECTRIC_BLUE_RVB_2_5e790f2852.png",
      "Eurosport 1":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Eurosport_HD_since_2015.svg/120px-Eurosport_HD_since_2015.svg.png",
      "RMC Sport 1":"https://upload.wikimedia.org/wikipedia/commons/b/bf/Logo_RMC_Sport_2018.svg"
    };
    const ch=new URLSearchParams(window.location.search).get('c')||'';
    document.getElementById('chName').textContent=ch||'NovaPlay'; document.title=ch?ch+' — NovaPlay':'NovaPlay';
    const chLogo=CHANNEL_LOGOS[ch]; if(chLogo){const l=document.getElementById('chLogo');l.src=chLogo;l.style.display='block';}
    let cur=1,iframe=null,paused=false,saved=''; const vb=document.getElementById('videoBox'),sources=STREAM_SOURCES[ch];
    if(sources){['s1','s2'].forEach((id,i)=>{const s=sources[i+1];if(!s||(typeof s==='string'&&s===''))document.getElementById(id).disabled=true;});}
    function load(n){ const s=sources?.[n];if(!s||(typeof s==='string'&&s===''))return; vb.querySelectorAll('.zoom-wrap').forEach(e=>e.remove()); document.getElementById('noFeed').style.display='none';paused=false; document.getElementById('btnPause').innerHTML='<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg><span>Pause</span>'; document.getElementById('btnPause').classList.remove('on'); const zw=document.createElement('div');zw.className='zoom-wrap';iframe=null; if(typeof s==='string'){iframe=document.createElement('iframe');iframe.src=s;iframe.allow='accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen';} else if(s.type==='embed'&&s.code){zw.innerHTML=s.code;iframe=zw.querySelector('iframe');} if(iframe){iframe.allowFullscreen=true;iframe.setAttribute('webkitallowfullscreen','');iframe.setAttribute('mozallowfullscreen','');zw.appendChild(iframe);} else{document.getElementById('noFeed').style.display='flex';return;} vb.appendChild(zw); ['s1','s2'].forEach((id,i)=>document.getElementById(id).classList.toggle('active',(i+1)===n)); cur=n; }
    window.switchSource=function(n){if(n!==cur)load(n);}; if(sources&&sources[1])load(1);
    document.getElementById('btnFS').addEventListener('click',()=>{if(vb.requestFullscreen)vb.requestFullscreen().catch(()=>{});else if(vb.webkitRequestFullscreen)vb.webkitRequestFullscreen();else if(vb.webkitEnterFullscreen)vb.webkitEnterFullscreen();else if(vb.msRequestFullscreen)vb.msRequestFullscreen();});
    document.getElementById('btnPause').addEventListener('click',()=>{if(!iframe)return;const btn=document.getElementById('btnPause');if(!paused){saved=iframe.src||'';if(iframe.src)iframe.src='';else iframe.style.display='none';btn.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg><span>Lecture</span>';btn.classList.add('on');paused=true;}else{if(saved)iframe.src=saved;else iframe.style.display='';btn.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg><span>Pause</span>';btn.classList.remove('on');paused=false;}});
    document.getElementById('btnRefresh').addEventListener('click',()=>load(cur));
  </script>
</body>
</html>
