<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta http-equiv="Permissions-Policy" content="fullscreen=*" />
  <meta name="theme-color" content="#000000" />
  <title>Direct — NovaPlay</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3CradialGradient id='g' cx='50%25' cy='50%25'%3E%3Cstop offset='0%25' style='stop-color:%234ade80;stop-opacity:1'/%3E%3Cstop offset='100%25' style='stop-color:%2316a34a;stop-opacity:1'/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='46' fill='url(%23g)'/%3E%3Cpath d='M36 28 L36 72 L68 50 Z' fill='white' opacity='0.95'/%3E%3Ccircle cx='50' cy='50' r='20' fill='none' stroke='white' stroke-width='1.5' opacity='0.3'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --glass: rgba(19,26,19,0.92);
      --green-400: #4ade80; --green-500: #22c55e;
      --green-smudge: rgba(34,197,94,0.05);
      --text-main: #dde5dd; --text-soft: #889088;
      --border-hair: rgba(255,255,255,0.03);
      --radius-sm: 8px; --radius-md: 14px; --radius-pill: 100px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif; background: #000;
      color: var(--text-main); height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased; overflow: hidden;
    }

    .topbar {
      flex-shrink: 0; background: var(--glass);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-hair); padding: 0.4rem 0;
    }

    .topbar-inner {
      max-width: 1100px; margin: 0 auto; padding: 0 1rem;
      display: flex; align-items: center; justify-content: space-between;
    }

    .back-btn {
      display: flex; align-items: center; gap: 0.25rem;
      color: var(--text-soft); text-decoration: none;
      font-weight: 500; font-size: 0.72rem; transition: color 0.2s;
    }
    .back-btn:hover { color: var(--green-400); }

    .player-zone {
      flex: 1; display: flex; flex-direction: column;
      max-width: 1100px; margin: 0 auto; width: 100%; padding: 0.3rem; min-height: 0;
    }

    .video-box {
      flex: 1; background: #000; border-radius: var(--radius-md);
      overflow: hidden; position: relative; min-height: 260px;
      border: 1px solid var(--border-hair); aspect-ratio: 16/9;
      max-height: calc(100vh - 200px);
    }

    .video-box:fullscreen { border-radius:0; border:none; max-height:none; aspect-ratio:auto; }
    .video-box:-webkit-full-screen { border-radius:0; border:none; max-height:none; aspect-ratio:auto; }

    .zoom-wrap { position: absolute; inset: 0; overflow: hidden; }
    .zoom-wrap iframe {
      position: absolute; top: 50%; left: 50%;
      width: 104%; height: 104%;
      transform: translate(-50%, -50%) scale(1.04);
      border: none; transform-origin: center center;
    }

    .no-feed {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; text-align: center;
      color: var(--text-soft); position: absolute; inset: 0; z-index: 1;
    }
    .no-feed .icon { font-size: 2.5rem; opacity: 0.15; margin-bottom: 0.3rem; }
    .no-feed .title { font-size: 0.85rem; font-weight: 700; color: var(--text-main); }

    .ch-display {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 1rem; background: var(--glass);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-hair); border-radius: var(--radius-md);
      margin: 0.4rem 0; flex-shrink: 0;
    }

    .ch-display-logo { width: 40px; height: 40px; border-radius: 8px; object-fit: contain; flex-shrink: 0; background: #111; }
    .ch-display-info { min-width: 0; }
    .ch-display-name { font-weight: 700; font-size: 0.9rem; letter-spacing: -0.01em; }
    .ch-display-status {
      display: flex; align-items: center; gap: 0.3rem;
      font-size: 0.65rem; color: var(--green-400); margin-top: 0.1rem;
    }
    .ch-display-dot { width: 5px; height: 5px; background: var(--green-500); border-radius: 50%; animation: beat 2.5s infinite; }
    @keyframes beat {
      0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(34,197,94,0.5); }
      50% { opacity:0.3; box-shadow:0 0 0 6px rgba(34,197,94,0); }
    }

    .ch-display-quality {
      margin-left: auto; padding: 0.2rem 0.6rem;
      background: var(--green-smudge); border: 1px solid rgba(34,197,94,0.12);
      border-radius: var(--radius-pill); font-size: 0.6rem;
      font-weight: 700; color: var(--green-400);
    }

    .controls {
      display: flex; align-items: center; justify-content: center;
      gap: 0.3rem; padding: 0.35rem 0; flex-shrink: 0; flex-wrap: wrap;
    }

    .ctrl {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 0.22rem; padding: 0.35rem 0.75rem; background: var(--glass);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border-hair); border-radius: var(--radius-pill);
      color: var(--text-main); font-family: inherit; font-size: 0.68rem;
      font-weight: 500; cursor: pointer; transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .ctrl:hover { border-color: var(--green-500); background: var(--green-smudge); color: var(--green-400); }
    .ctrl.on { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.25); color: var(--green-400); }
    .ctrl svg { width: 13px; height: 13px; }

    .tip {
      padding: 0.4rem 0.65rem; background: var(--glass);
      border-radius: var(--radius-md); flex-shrink: 0; margin-top: 0.15rem;
    }
    .tip p { color: var(--text-soft); font-size: 0.6rem; }
    .tip strong { color: var(--green-400); }

    @media (max-width:768px) {
      .player-zone { padding: 0.2rem; }
      .video-box { border-radius: var(--radius-sm); min-height: 220px; }
      .ctrl { padding: 0.3rem 0.6rem; font-size: 0.64rem; }
      .ch-display { padding: 0.55rem 0.75rem; gap: 0.5rem; }
      .ch-display-logo { width: 34px; height: 34px; }
      .ch-display-name { font-size: 0.8rem; }
    }
    @media (max-width:380px) {
      .ctrl span { display: none; }
      .ctrl { padding: 0.35rem; }
      .ctrl svg { width: 15px; height: 15px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="javascript:history.back()" class="back-btn">← Retour</a>
      <span style="font-weight:700;font-size:0.8rem;">NovaPlay</span>
      <div style="width:50px;"></div>
    </div>
  </header>

  <main class="player-zone">
    <div class="video-box" id="videoBox">
      <div class="no-feed" id="noFeed">
        <div class="icon">📺</div>
        <div class="title">Aucun flux disponible</div>
      </div>
    </div>

    <div class="ch-display" id="chDisplay">
      <img class="ch-display-logo" id="chLogo" src="" alt="" style="display:none;" />
      <div class="ch-display-info">
        <div class="ch-display-name" id="chName">Chargement...</div>
        <div class="ch-display-status"><span class="ch-display-dot"></span>En direct</div>
      </div>
      <span class="ch-display-quality" id="chQuality">HD</span>
    </div>

    <div class="controls">
      <button class="ctrl" id="btnPause">
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        <span>Pause</span>
      </button>
      <button class="ctrl" id="btnFS">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        <span>Plein écran</span>
      </button>
      <button class="ctrl" id="btnRefresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        <span>Actualiser</span>
      </button>
    </div>

    <div class="tip">
      <p>💡 <strong>Conseil :</strong> Connexion ≥ 5 Mbps recommandée.</p>
    </div>
  </main>

  <script defer>
    const STREAM_URLS = {
      "beIN SPORTS 1": "https://mapple.uk/live-tv-premium/116",
      "beIN SPORTS 2": "https://mapple.uk/live-tv-premium/117",
      "beIN SPORTS 3": "https://mapple.uk/live-tv-premium/118",
      "beIN SPORTS MAX 4": "https://mapple.uk/live-tv-premium/494",
      "beIN SPORTS MAX 5": "https://mapple.uk/live-tv-premium/495",
      "beIN SPORTS MAX 6": "https://mapple.uk/live-tv-premium/496",
      "beIN SPORTS MAX 7": "https://mapple.uk/live-tv-premium/497",
      "beIN SPORTS MAX 8": "https://mapple.uk/live-tv-premium/498",
      "beIN SPORTS MAX 9": "https://mapple.uk/live-tv-premium/499",
      "beIN SPORTS MAX 10": "https://mapple.uk/live-tv-premium/500",
      "Canal": "https://mapple.uk/live-tv-premium/121",
      "Canal Sport": "https://mapple.uk/live-tv-premium/122",
      "Canal Sport360": "https://mapple.uk/live-tv-premium/464",
      "Canal Foot": "https://mapple.uk/live-tv-premium/463",
      "Ligue 1+": "https://mapple.uk/live-tv-premium/960",
      "Eurosport 1": "https://mapple.uk/live-tv-premium/772",
      "Eurosport 2": "https://mapple.uk/live-tv-premium/773",
      "RMC Sport 1": "https://mapple.uk/live-tv-premium/119"
    };

    const CHANNEL_LOGOS = {
      "beIN SPORTS 1": "https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_1_134e751711.png",
      "beIN SPORTS 2": "https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_2_7cb5d3a006.png",
      "beIN SPORTS 3": "https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_3_7e4adcefc6.png",
      "beIN SPORTS MAX 4": "https://freebox.cdn.scw.iliad.fr/large_Logo_be_IN_SPORTS_MAX_4_c3c337c2ff.png",
      "Canal": "https://freebox.cdn.scw.iliad.fr/4_5086f4334d.png",
      "Canal Sport": "https://freebox.cdn.scw.iliad.fr/2023_07_24_RVB_LOGO_CANALPLUS_SPORT_9bd2c51b31.png",
      "Canal Sport360": "https://freebox.cdn.scw.iliad.fr/2023_07_24_RVB_LOGO_CANALPLUS_SPORT_360_7772de4eea.png",
      "Canal Foot": "https://freebox.cdn.scw.iliad.fr/2023_07_24_RVB_LOGO_CANALPLUS_FOOT_581adea3dd.png",
      "Ligue 1+": "https://freebox.cdn.scw.iliad.fr/large_LFP_LOGOTYPE_L1_MASTER_ELECTRIC_BLUE_RVB_2_5e790f2852.png",
      "Eurosport 1": "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Eurosport_HD_since_2015.svg/120px-Eurosport_HD_since_2015.svg.png",
      "Eurosport 2": "https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Eurosport_2_HD_Logo_2015.svg/1920px-Eurosport_2_HD_Logo_2015.svg.png",
      "RMC Sport 1": "https://upload.wikimedia.org/wikipedia/commons/b/bf/Logo_RMC_Sport_2018.svg"
    };

    const ch = new URLSearchParams(window.location.search).get('c') || '';
    document.getElementById('chName').textContent = ch || 'NovaPlay';
    document.title = ch ? ch + ' — NovaPlay' : 'NovaPlay';

    const chLogo = CHANNEL_LOGOS[ch];
    if (chLogo) {
      const logoEl = document.getElementById('chLogo');
      logoEl.src = chLogo;
      logoEl.style.display = 'block';
    }

    let iframe = null, paused = false, savedSrc = '';
    const url = STREAM_URLS[ch];
    const vb = document.getElementById('videoBox');

    if (url) {
      document.getElementById('noFeed').style.display = 'none';
      const zw = document.createElement('div');
      zw.className = 'zoom-wrap';
      iframe = document.createElement('iframe');
      iframe.src = url;
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen';
      iframe.allowFullscreen = true;
      iframe.setAttribute('webkitallowfullscreen','');
      iframe.setAttribute('mozallowfullscreen','');
      zw.appendChild(iframe);
      vb.appendChild(zw);
    }

    document.getElementById('btnFS').addEventListener('click', () => {
      if (vb.requestFullscreen) vb.requestFullscreen().catch(()=>{});
      else if (vb.webkitRequestFullscreen) vb.webkitRequestFullscreen();
      else if (vb.webkitEnterFullscreen) vb.webkitEnterFullscreen();
      else if (vb.msRequestFullscreen) vb.msRequestFullscreen();
    });

    document.getElementById('btnPause').addEventListener('click', () => {
      if (!iframe || !url) return;
      const btn = document.getElementById('btnPause');
      if (!paused) {
        savedSrc = iframe.src; iframe.src = '';
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg><span>Lecture</span>';
        btn.classList.add('on'); paused = true;
      } else {
        iframe.src = savedSrc;
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg><span>Pause</span>';
        btn.classList.remove('on'); paused = false;
      }
    });

    document.getElementById('btnRefresh').addEventListener('click', () => {
      if (!iframe || !url) return;
      iframe.src = '';
      setTimeout(() => { iframe.src = url; if (paused) { paused = false; const btn = document.getElementById('btnPause'); btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg><span>Pause</span>'; btn.classList.remove('on'); } }, 200);
    });
  </script>
</body>
</html>
