  <style>
    :root {
      --bg-root:#0a0f0a; --bg-surface:#131a13; --bg-card:#1a231a;
      --bg-card-hover:#212b21; --bg-glass:rgba(19,26,19,0.88);
      --green-400:#4ade80; --green-500:#22c55e; --green-600:#16a34a;
      --green-smudge:rgba(34,197,94,0.04); --green-border:rgba(34,197,94,0.1);
      --text-primary:#dde5dd; --text-secondary:#889088; --text-tertiary:#586058;
      --border-hair:rgba(255,255,255,0.03); --border-std:rgba(255,255,255,0.06);
      --scrollbar-track:#131a13; --scrollbar-thumb:#22c55e;
      --shadow-sidebar:0 0 40px rgba(0,0,0,0.5); --shadow-hover:0 8px 30px rgba(0,0,0,0.6);
      --radius-sm:8px; --radius-md:14px; --radius-lg:20px; --radius-xl:24px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family:'Inter',system-ui,sans-serif; background:var(--bg-root);
      color:var(--text-primary); line-height:1.5; min-height:100vh;
      -webkit-font-smoothing:antialiased; display:flex;
    }

    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:var(--scrollbar-track); }
    ::-webkit-scrollbar-thumb { background:var(--scrollbar-thumb); border-radius:10px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--green-400); }
    html { scrollbar-color:var(--scrollbar-thumb) var(--scrollbar-track); scrollbar-width:thin; }

    .bg-ambient {
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background:radial-gradient(ellipse at 30% 25%, rgba(34,197,94,0.035) 0%, transparent 55%),
                radial-gradient(ellipse at 70% 55%, rgba(74,222,128,0.025) 0%, transparent 50%);
    }

    /* ═══════════ SIDEBAR ═══════════ */
    .sidebar {
      position:fixed; top:0; left:0; bottom:0; z-index:200;
      width:220px; background:var(--bg-glass);
      backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
      border-right:1px solid var(--border-hair);
      display:flex; flex-direction:column;
      padding:1.5rem 1rem; gap:0.5rem;
      box-shadow:var(--shadow-sidebar);
    }

    .sidebar-brand {
      display:flex; align-items:center; gap:0.7rem;
      text-decoration:none; color:var(--text-primary);
      margin-bottom:1rem; padding:0 0.3rem;
    }

    .sidebar-logo { width:40px; height:40px; flex-shrink:0; }
    .sidebar-name { font-size:1.2rem; font-weight:800; letter-spacing:-0.04em; }
    .sidebar-name span { color:var(--green-500); }

    .sidebar-section {
      font-size:0.6rem; font-weight:700; text-transform:uppercase;
      letter-spacing:0.08em; color:var(--text-tertiary);
      padding:0.8rem 0.3rem 0.3rem;
    }

    .sidebar-nav { display:flex; flex-direction:column; gap:0.15rem; }
    .sidebar-link {
      display:flex; align-items:center; gap:0.65rem;
      padding:0.6rem 0.7rem; border-radius:var(--radius-sm);
      color:var(--text-secondary); text-decoration:none;
      font-weight:500; font-size:0.78rem; transition:all 0.2s;
    }
    .sidebar-link:hover { color:var(--text-primary); background:var(--bg-card-hover); }
    .sidebar-link.on { background:var(--green-smudge); color:var(--green-400); font-weight:600; }
    .sidebar-link .s-icon { font-size:1rem; width:20px; text-align:center; flex-shrink:0; }

    .sidebar-spacer { flex:1; }

    .sidebar-info {
      display:flex; flex-direction:column; align-items:center;
      gap:0.4rem; padding:1rem 0;
    }

    .sidebar-live {
      display:flex; align-items:center; gap:0.5rem;
      font-weight:700; font-size:0.8rem; color:var(--green-400);
    }

    .sidebar-live-dot {
      width:7px; height:7px; background:var(--green-500);
      border-radius:50%; animation:beat 2.5s infinite;
    }

    @keyframes beat {
      0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(34,197,94,0.5); }
      50% { opacity:0.3; box-shadow:0 0 0 6px rgba(34,197,94,0); }
    }

    .sidebar-clock {
      font-weight:800; font-size:1.1rem; color:var(--text-primary);
      font-variant-numeric:tabular-nums; letter-spacing:0.02em;
    }

    /* ═══════════ MAIN ═══════════ */
    .main { margin-left:220px; flex:1; position:relative; z-index:1; display:flex; flex-direction:column; }
    .wrap { max-width:1050px; margin:0 auto; padding:1.5rem 2rem; width:100%; }

    .cat-header {
      display:flex; align-items:center; gap:0.6rem; margin-bottom:1.5rem;
    }

    .cat-icon { font-size:1.5rem; }
    .cat-title { font-size:1.3rem; font-weight:800; letter-spacing:-0.03em; }
    .cat-count { margin-left:auto; color:var(--text-tertiary); font-size:0.7rem; font-weight:600; }

    /* ═══════════ CARTES ═══════════ */
    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:0.85rem; }

    .card {
      background:var(--bg-card); border:1px solid var(--border-hair);
      border-radius:var(--radius-xl); overflow:hidden; text-decoration:none;
      color:inherit; transition:all 0.3s ease; display:flex; flex-direction:column;
      position:relative;
    }

    .card:hover {
      transform:translateY(-4px); border-color:var(--green-border);
      box-shadow:var(--shadow-hover), 0 0 0 1px var(--green-border);
    }

    .card::after {
      content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
      background:linear-gradient(90deg, transparent, var(--green-500), transparent);
      opacity:0; transition:opacity 0.3s;
    }

    .card:hover::after { opacity:1; }

    .card-media {
      padding:1.5rem 1.5rem 0.8rem; display:flex; align-items:center;
      justify-content:center; min-height:120px; background:var(--bg-surface);
    }

    .card-img {
      max-width:62%; max-height:56px; object-fit:contain;
      transition:transform 0.4s ease; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3));
    }

    .card:hover .card-img { transform:scale(1.08); }

    .card-body { padding:0.8rem 1.2rem 1rem; text-align:center; }

    .card-status-row {
      display:flex; align-items:center; justify-content:center; gap:0.5rem;
      margin-bottom:0.4rem;
    }

    .card-status-badge {
      display:inline-flex; align-items:center; gap:0.3rem;
      padding:0.2rem 0.65rem; border-radius:var(--radius-sm);
      font-size:0.58rem; font-weight:700; text-transform:uppercase; letter-spacing:0.04em;
    }

    .card-status-badge.live {
      background:rgba(34,197,94,0.1); color:var(--green-400);
      border:1px solid rgba(34,197,94,0.2);
    }

    .card-status-badge.off {
      background:rgba(88,96,88,0.15); color:var(--text-tertiary);
      border:1px solid var(--border-hair);
    }

    .card-bulb { width:5px; height:5px; border-radius:50%; }
    .card-bulb.live { background:var(--green-500); box-shadow:0 0 8px rgba(34,197,94,0.4); animation:beat 2.5s infinite; }
    .card-bulb.off { background:var(--text-tertiary); }

    .card-quality-pill {
      padding:0.2rem 0.6rem; border-radius:var(--radius-sm);
      font-size:0.55rem; font-weight:700; letter-spacing:0.03em;
      background:rgba(74,222,128,0.08); color:var(--green-400);
      border:1px solid rgba(74,222,128,0.15);
    }

    .card-title {
      font-weight:700; font-size:0.82rem; letter-spacing:-0.01em;
      line-height:1.3; margin-bottom:0.15rem;
    }

    .card-sub {
      color:var(--text-tertiary); font-size:0.6rem;
      text-transform:uppercase; letter-spacing:0.04em;
    }

    /* ═══════════ FOOTER ═══════════ */
    .footer { text-align:center; padding:2rem 0; margin-top:auto; border-top:1px solid var(--border-hair); }
    .footer-name { font-size:0.85rem; font-weight:700; letter-spacing:-0.02em; margin-bottom:0.1rem; }
    .footer-name em { font-style:normal; color:var(--green-500); }
    .footer-legal { color:var(--text-tertiary); font-size:0.55rem; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .anim-in { animation:fadeUp 0.4s ease forwards; opacity:0; }

    @media (max-width:768px) {
      .sidebar { width:0; overflow:hidden; padding:1.5rem 0; }
      .main { margin-left:0; }
      .wrap { padding:1rem; }
      .grid { grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:0.6rem; }
      .card-media { min-height:100px; padding:1.2rem 1.2rem 0.6rem; }
      .card-body { padding:0.6rem 0.9rem 0.8rem; }
    }

    @media (max-width:480px) { .grid { grid-template-columns:repeat(2, 1fr); } }
  </style>
</head>

      const channels = CHANNELS.filter(c => cat.match(c.name));
      document.getElementById('catHeader').innerHTML =
        '<span class="cat-icon">' + cat.icon + '</span><h1 class="cat-title">' + cat.name + '</h1><span class="cat-count">' + channels.length + ' chaînes</span>';

      document.getElementById('channelGrid').innerHTML = channels.map(ch => {
        const off = ch.status === 'offline';
        return `<a href="stream.html?c=${encodeURIComponent(ch.name)}" class="card">
          <div class="card-media"><img class="card-img" src="${ch.image || PH}" alt="" loading="lazy" /></div>
          <div class="card-body">
            <div class="card-status-row">
              <span class="card-status-badge ${off?'off':'live'}"><span class="card-bulb ${off?'off':'live'}"></span>${off?'Offline':'En direct'}</span>
              <span class="card-quality-pill">${ch.quality}</span>
            </div>
            <div class="card-title">${ch.name}</div>
            <div class="card-sub">France</div>
          </div></a>`;
      }).join('');
    }

    function updateClock() {
      document.getElementById('sidebarClock').textContent =
        String(new Date().getHours()).padStart(2,'0')+':'+String(new Date().getMinutes()).padStart(2,'0');
    }
    updateClock();
    setInterval(updateClock, 30000);
  </script>
</body>
</html>
